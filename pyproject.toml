[tool.semantic_release]
version_variables = ["pyproject.toml:tool.semantic_release.version"]
build_command = ""
major_on_zero = false
tag_format = "v{version}"

# Current version (maintained by semantic-release — do not edit manually)
version = "1.0.0"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease = false

[tool.semantic_release.changelog]
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore", "revert"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
type = "github"
