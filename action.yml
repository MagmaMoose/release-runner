name: 'Release Runner'
description: 'Semantic release orchestration for TBD/BBD pipelines with Docker image promotion and promotion PR automation.'

branding:
  icon: 'git-branch'
  color: 'purple'

# ─────────────────────────────────────────────────────────────────────────────
# INPUTS
# ─────────────────────────────────────────────────────────────────────────────
inputs:

  # ── Mode ─────────────────────────────────────────────────────────────────
  mode:
    description: |
      Pipeline mode. One of:
        ci       Build Docker image and push pr-<N> to GHCR (run on pull_request events).
        release  (default) Run versioning, promote Docker image, and optionally create a promotion PR (when deployment-model is tbd-pr and create-promotion-pr is true).
    required: false
    default: 'release'

  # ── Authentication mode ─────────────────────────────────────────────────
  auth-mode:
    description: |
      Token source for git/release operations. One of:
        public-app    (default) Use the Release Runner GitHub App installed on the repository or organization.
        auto          Use private-app when app-id/app-private-key are set, otherwise use github-token/GITHUB_TOKEN.
        github-token  Use github-token or the workflow GITHUB_TOKEN.
        private-app   Generate a token from app-id/app-private-key.
    required: false
    default: 'public-app'

  token-broker-url:
    description: |
      Advanced override for the hosted Release Runner GitHub App auth service.
      Most repositories should not set this.
    required: false
    default: 'https://release-runner.sargeant.workers.dev'

  oidc-audience:
    description: 'Advanced override for public-app authentication. Most repositories should not set this.'
    required: false
    default: 'release-runner'

  # ── Versioning tool ──────────────────────────────────────────────────────
  versioning-tool:
    description: |
      The versioning tool to use. One of:
        semantic-release-python   python-semantic-release v10 (default)
        semantic-release-npm      semantic-release v24 (Node.js / JavaScript)
        gitversion                GitVersion via gittools/actions
        release-please            Google release-please-action v4
    required: false
    default: 'semantic-release-python'

  # ── Deployment model ─────────────────────────────────────────────────────
  deployment-model:
    description: |
      Controls how the target environment is determined. One of:
        tbd       (default) Trunk-Based Development. Pass `environment` explicitly.
        bbd       Branch-Based Development. Environment inferred from branch-map.
        tbd-pr    TBD with PR-based promotion. Environment detected from the merged promote/* PR head branch.
    required: false
    default: 'tbd'

  branch-map:
    description: |
      JSON object mapping branch names to environment names. Only used when
      deployment-model is bbd.

      Plain BBD (one branch per environment):
        {"dev": "dev", "staging": "staging", "main": "prod"}

      Strict GitFlow (release/* and hotfix/* are dynamic branch families).
      Keys containing `*` are treated as globs — they match any segment up
      to the next slash boundary the same way shell globs do, anchored at
      both ends:
        {"develop": "dev", "release/*": "staging", "hotfix/*": "prod", "main": "prod"}

      Exact matches always win over globs. When two globs both match, the
      one with the longer key wins, so a specific pattern like
      `release/hotfix/*` beats `release/*`.
    required: false
    default: ''

  promote-branch-prefix:
    description: |
      Prefix for promotion PR branches (deployment-model: tbd-pr).
      Example: 'promote' → branch promote/staging/1.2.3-dev.1
    required: false
    default: 'promote'

  promote-target-branch:
    description: 'Target branch for promotion PRs.'
    required: false
    default: 'main'

  create-promotion-pr:
    description: |
      When true, automatically creates the next environment promotion PR after a
      prerelease (deployment-model: tbd-pr only). Set to false when using the
      tbd-promote reusable workflow separately.
    required: false
    default: 'false'

  # ── Environment model ────────────────────────────────────────────────────
  environment:
    description: |
      The target environment for this run. Must be in `environments`.
      Required when deployment-model is tbd.
    required: false
    default: ''

  environments:
    description: |
      JSON array of environment names in promotion order.
      The last entry is always treated as production (stable semver).
      Profiles: ["dev","prod"] | ["dev","staging","prod"] | ["dev","tst","acc","prd"]
    required: false
    default: '["dev", "staging", "prod"]'

  prerelease-identifiers:
    description: |
      JSON object mapping environment names to prerelease identifier strings.
      The production environment must be omitted from this map.
      Example: {"dev": "dev", "staging": "rc"}
    required: false
    default: '{"dev": "dev", "staging": "rc"}'

  tag-prefix:
    description: 'Version tag prefix.'
    required: false
    default: 'v'

  # ── Authentication ────────────────────────────────────────────────────────
  github-token:
    description: |
      GitHub token for GHCR login and, unless auth-mode uses a GitHub App, git
      push, tag creation, GitHub Releases, and promotion PR creation. Defaults
      to the workflow GITHUB_TOKEN when omitted.
    required: false
    default: ''

  app-id:
    description: |
      GitHub App ID. When provided with app-private-key, generates a short-lived
      token to bypass branch protection rules.
    required: false
    default: ''

  app-private-key:
    description: 'GitHub App private key (PEM). Required when app-id is set.'
    required: false
    default: ''

  # ── Docker ────────────────────────────────────────────────────────────────
  image_name:
    description: |
      Base image name without registry or owner prefix (e.g., my-app).
      Sets IMAGE_NAME=<owner>/<image_name> for the bake file.
      Required for mode: ci. When set in mode: release, images are promoted after versioning.
    required: false
    default: ''

  bake_file:
    description: 'Path to docker-bake.hcl'
    required: false
    default: 'docker-bake.hcl'

  bake_target:
    description: |
      Bake target or group to build/promote.
      Groups are expanded — all sub-targets are built/promoted automatically.
    required: false
    default: 'default'

  registry:
    description: 'Container registry'
    required: false
    default: 'ghcr.io'

  platforms:
    description: 'Target platforms (comma-separated) for CI builds and fallback fresh builds.'
    required: false
    default: 'linux/amd64'

  build-github-token:
    description: |
      Optional token passed as --secret id=github_token to docker buildx bake.
      Use when Dockerfiles use --mount=type=secret,id=github_token to pull
      private packages (e.g. GitHub Packages).
      Pass secrets.NPM_TOKEN or secrets.GITHUB_TOKEN from the calling workflow.
    required: false
    default: ''

  # ── CI-specific ──────────────────────────────────────────────────────────
  enforce_branch_naming:
    description: |
      Enforce TBD branch naming convention on PRs (mode: ci).
      Allowed prefixes: feat, fix, chore, hotfix, docs, refactor, perf, test, ci, style.
      Set to false for BBD (branches are named after environments).
    required: false
    default: 'true'

  # ── Integrations: GitHub Projects ─────────────────────────────────────────
  aggregate-github-projects:
    description: |
      When true, after a release is created, walk the commits in the release
      range and the bodies of any PRs landed in that range, collect issue
      and PR references (#NNN), look up their Projects v2 membership via
      the GitHub GraphQL API, and append a "## GitHub Project items"
      section (grouped by Project, with the item's Status when available)
      to the GitHub Release notes and to any open promotion PR body that
      mentions the tag.

      The auth token must have:
        - Repository: Contents: Read
        - Repository: Issues: Read
        - Repository: Pull requests: Read
        - Repository: Releases: Write (to edit release notes)
        - Repository: Pull requests: Write (to edit promotion PR bodies)
        - Organization or User: Projects: Read

      With auth-mode: public-app, the default Release Runner App ships
      with only the permissions needed for tagging and Releases. Issues,
      Pull requests, and Projects must be granted on the App settings
      AND re-accepted on each installation; otherwise the GraphQL probe
      that finds a ref's Projects v2 membership returns NOT_FOUND for
      every issue/PR (the script logs "Ref #N: GraphQL returned no
      node" with the underlying error and skips the ref).

      With auth-mode: github-token, the workflow GITHUB_TOKEN cannot
      read org-scoped Projects v2 — supply a PAT with `repo` and
      `read:project` (or fine-grained equivalents).
    required: false
    default: 'false'

  move-github-projects-on-release:
    description: |
      When true, after a release is created, move every Projects v2 item
      linked to issues/PRs in the release range to a target Status.
      Intended for closing the loop on releases — e.g. moving "In review"
      cards to "Released" when the prod tag is cut.

      Set `github-projects-target-status` to the Status value to move to
      (must already exist on the Project). The status move is opt-in
      because not every project board has a "Released" column.

      Skipped silently when the project's Status field has no matching
      option. Works alongside `aggregate-github-projects` — the two are
      independent toggles, and they need the same Issues + PRs + Projects
      read scopes (see aggregate-github-projects). For the move itself
      the token must additionally have Organization or User: Projects:
      Write. With auth-mode: github-token, supply a PAT with `project`
      scope (read+write).
    required: false
    default: 'false'

  github-projects-target-status:
    description: |
      Target Status name for `move-github-projects-on-release`. Must match
      an existing single-select option on each project's Status field.
      Common values: 'Released', 'Done', 'Shipped'.
    required: false
    default: 'Released'

  github-projects-move-on-environments:
    description: |
      JSON array of environments where the auto-move should fire. Defaults
      to the production environment only (last entry of `environments`),
      so prereleases don't prematurely mark items released.

      Special values:
        '@last'   (default) Resolve at runtime to the last entry of
                  `environments`. Production-by-default in any naming.
        '[]'      Move on every environment.

      Or a literal JSON array of environment names, e.g. '["staging","prod"]'.
    required: false
    default: '@last'

  # ── Guardrails ────────────────────────────────────────────────────────────
  admin-required-from:
    description: |
      Threshold environment for the manual-release guardrail. Manual
      workflow_dispatch runs whose target environment is at or after this
      threshold (in the `environments` list) require the actor to have
      `permission: admin` on the repository. Push and promotion-PR-merge
      triggers are unaffected.

      Special values:
        '@last'   (default) Use the last entry in `environments`. With the
                  default environments=["dev","staging","prod"] this protects
                  prod only; with environments=["dev","tst","acc","prd"] it
                  protects prd only. The point is to give every consumer
                  production protection out of the box without needing to
                  know the literal env name.
        ''        Opt out. No manual-release guardrail.

      Or set to a specific environment name (must appear in `environments`)
      to gate that env and everything downstream.

      Examples (environments = ["dev","staging","prod"]):
        '@last'   → only prod releases require admin (default)
        prod      → only prod releases require admin
        staging   → staging and prod require admin
        dev       → all envs require admin
        ''        → no guardrail

      The auth token must allow Repository: Administration: Read. With
      auth-mode: public-app, grant the permission on the Release Runner App
      and accept it on the installation.
    required: false
    default: '@last'

  # ── Common release options ────────────────────────────────────────────────
  working-directory:
    description: |
      Working directory containing the versioning config file.
      For semantic-release-python: pyproject.toml
      For semantic-release-npm:    .releaserc.json / package.json
      For gitversion:              GitVersion.yml
    required: false
    default: '.'

  create-release:
    description: 'Create a GitHub Release on every version bump.'
    required: false
    default: 'true'

  changelog:
    description: 'Generate/update CHANGELOG.md (semantic-release-python and semantic-release-npm).'
    required: false
    default: 'true'

  force-bump:
    description: |
      Force a specific version bump instead of letting the versioning tool
      decide from commit messages. Designed for `workflow_dispatch` runs
      where there are no qualifying conventional commits since the last
      release but you still want to cut a new version (the typical
      "no_release / Released: false" outcome).

      Allowed values:
        patch    Force a patch bump (e.g. 1.2.3 → 1.2.4).
        minor    Force a minor bump (e.g. 1.2.3 → 1.3.0).
        major    Force a major bump (e.g. 1.2.3 → 2.0.0).
        ''       (default) Let the versioning tool decide.

      Honoured by:
        - semantic-release-python: passed as the upstream `force` input.
        - gitversion: passed as `/overrideconfig increment=Major|Minor|Patch`.

      Ignored by semantic-release-npm and release-please — those tools
      have no clean equivalent and a forced bump would conflict with the
      tool's own logic. Wire your `workflow_dispatch` `bump` input to
      this input from the caller workflow.
    required: false
    default: ''

  # ── Version file injection (any tool) ─────────────────────────────────────
  version-file:
    description: |
      Path to a JSON file where the released version is injected and committed
      back to the branch after every release. Works with every versioning
      tool, not just GitVersion. Typical use: persist the version into
      `appsettings.json` for a .NET app so the running container can display
      its own version.

      JSON only — the injection step uses `jq`. YAML targets (e.g. Helm
      `Chart.yaml`) aren't supported today; if `jq` errors on the file
      the step warns and skips so a mis-configured file does not block
      the release.

      The commit uses the resolved release auth token (Release Runner App,
      private app, or `github-token`), so it can bypass branch-protection
      rulesets when the App is in the bypass list. The commit message ends
      with `[skip ci]` so the push does not retrigger the release workflow.

      Leave empty to disable. The file must exist or the step is skipped
      with a warning.
    required: false
    default: ''

  version-file-json-path:
    description: |
      jq path for the version field inside `version-file`. Only used when
      `version-file` is set. Example: `.Application.Version`
    required: false
    default: '.Application.Version'
  # ── Integrations ──────────────────────────────────────────────────────────
  aggregate-clickup-tickets:
    description: |
      When true, after a release is created scan the commits in the release
      range and the descriptions of PRs that landed in that range for ClickUp
      ticket URLs (https://app.clickup.com/t/...). Any matches are appended
      as a "## ClickUp tickets" section to the GitHub Release notes and to
      the auto-opened promotion PR body when one exists.

      The auth token must allow editing release notes and PR bodies. With
      auth-mode: public-app this is already covered by the Release Runner App.
    required: false
    default: 'false'

  # ── GitVersion-specific ───────────────────────────────────────────────────
  gitversion-spec:
    description: 'GitVersion version spec (e.g., 6.x). Only used when versioning-tool is gitversion.'
    required: false
    default: '6.x'

  gitversion-config:
    description: 'Path to GitVersion.yml. Only used when versioning-tool is gitversion.'
    required: false
    default: 'GitVersion.yml'

  gitversion-appsettings-file:
    description: |
      DEPRECATED — use `version-file` instead. Retained for backwards
      compatibility. When both are set, `version-file` wins.
    required: false
    default: ''

  gitversion-appsettings-version-path:
    description: |
      DEPRECATED — use `version-file-json-path` instead. Retained for
      backwards compatibility.
    required: false
    default: ''

  # ── release-please-specific ───────────────────────────────────────────────
  release-please-release-type:
    description: 'release-please release type (python, node, simple, go, etc.).'
    required: false
    default: 'simple'

  release-please-config-file:
    description: 'Path to release-please-config.json.'
    required: false
    default: 'release-please-config.json'

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────────────────────────────────────
outputs:
  version:
    description: 'Semver version string without prefix (e.g., 1.2.3 or 1.2.3-rc.1)'
    value: ${{ steps.normalize.outputs.version }}
  tag:
    description: 'Full git tag with prefix (e.g., v1.2.3 or v1.2.3-rc.1)'
    value: ${{ steps.normalize.outputs.tag }}
  is-prerelease:
    description: '"true" if this environment produces a prerelease version'
    value: ${{ steps.detect-env.outputs.is_prerelease }}
  released:
    description: '"true" if a new version was created and published'
    value: ${{ steps.normalize.outputs.released }}
  prerelease-identifier:
    description: 'The prerelease identifier (e.g., dev, rc, alpha). Empty for production.'
    value: ${{ steps.detect-env.outputs.prerelease_identifier }}
  resolved-environment:
    description: 'The resolved environment name.'
    value: ${{ steps.detect-env.outputs.environment }}

# ─────────────────────────────────────────────────────────────────────────────
# STEPS
# ─────────────────────────────────────────────────────────────────────────────
runs:
  using: composite
  steps:

    # ── 1. Optional GitHub App token ────────────────────────────────────────
    - name: Generate private GitHub App token
      id: app-token
      if: |
        inputs.auth-mode == 'private-app' ||
        (
          inputs.auth-mode == 'auto' &&
          inputs.app-id != '' &&
          inputs.app-private-key != ''
        )
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Request public GitHub App token
      id: public-app-token
      if: inputs.mode == 'release' && inputs.auth-mode == 'public-app'
      shell: bash
      env:
        TOKEN_BROKER_URL: ${{ inputs.token-broker-url }}
        OIDC_AUDIENCE: ${{ inputs.oidc-audience }}
      run: "${GITHUB_ACTION_PATH}/scripts/request-public-app-token.sh"

    - name: Resolve GitHub auth token
      id: auth
      shell: bash
      env:
        ACTION_MODE: ${{ inputs.mode }}
        AUTH_MODE: ${{ inputs.auth-mode }}
        PRIVATE_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        PUBLIC_APP_TOKEN: ${{ steps.public-app-token.outputs.token }}
        DEFAULT_GITHUB_TOKEN: ${{ inputs.github-token || github.token }}
      run: "${GITHUB_ACTION_PATH}/scripts/resolve-auth-token.sh"

    # ── 2. Checkout ─────────────────────────────────────────────────────────
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
        token: ${{ steps.auth.outputs.token }}

    # ═════════════════════════════════════════════════════════════════════════
    # CI MODE — build and push pr-<N> image
    # ═════════════════════════════════════════════════════════════════════════

    - name: Check TBD branch naming
      if: inputs.mode == 'ci' && inputs.enforce_branch_naming == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        PROMOTE_BRANCH_PREFIX: ${{ inputs.promote-branch-prefix }}
      run: "${GITHUB_ACTION_PATH}/scripts/check-branch-naming.sh"

    - name: Set up QEMU
      if: inputs.mode == 'ci' && inputs.image_name != ''
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Docker Buildx (CI)
      if: inputs.mode == 'ci' && inputs.image_name != ''
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to GHCR (CI)
      if: inputs.mode == 'ci' && inputs.image_name != ''
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ steps.auth.outputs.registry-token }}

    - name: Build and push pr-<N>
      if: inputs.mode == 'ci' && inputs.image_name != ''
      shell: bash
      run: |
        set -euo pipefail

        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        export IMAGE_NAME="${OWNER_LOWER}/${{ inputs.image_name }}"

        echo "IMAGE_NAME: ${IMAGE_NAME}"
        echo "VERSION:    ${VERSION}"

        TARGETS=$(docker buildx bake \
          -f "${{ inputs.bake_file }}" "${{ inputs.bake_target }}" \
          --print 2>/dev/null | jq -r '.target | keys[]')

        CACHE_ARGS=()
        for TARGET in ${TARGETS}; do
          SCOPE="bk-${TARGET}-${{ github.ref_name }}"
          CACHE_ARGS+=(--set "${TARGET}.cache-from=type=gha,scope=${SCOPE}")
          CACHE_ARGS+=(--set "${TARGET}.cache-to=type=gha,mode=max,scope=${SCOPE}")
        done

        docker buildx bake \
          -f "${{ inputs.bake_file }}" \
          "${{ inputs.bake_target }}" \
          "${CACHE_ARGS[@]}" \
          --push
      env:
        VERSION: pr-${{ github.event.pull_request.number }}
        REGISTRY: ${{ inputs.registry }}
        PLATFORMS: ${{ inputs.platforms }}
        BAKE_GITHUB_TOKEN: ${{ inputs.build-github-token }}

    # ═════════════════════════════════════════════════════════════════════════
    # RELEASE MODE — versioning
    # ═════════════════════════════════════════════════════════════════════════

    - name: Detect environment
      id: detect-env
      if: inputs.mode == 'release'
      shell: bash
      run: |
        set -euo pipefail

        DEPLOY_MODEL="${{ inputs.deployment-model }}"
        BRANCH_MAP='${{ inputs.branch-map }}'
        ENV="${{ inputs.environment }}"
        ENVS='${{ inputs.environments }}'
        IDS='${{ inputs.prerelease-identifiers }}'

        echo "Deployment model: ${DEPLOY_MODEL}"
        echo "Environments:     ${ENVS}"
        echo "Identifiers:      ${IDS}"

        if [ "${DEPLOY_MODEL}" == "bbd" ]; then
          if [ -z "${BRANCH_MAP}" ] || [ "${BRANCH_MAP}" == '{}' ] || [ "${BRANCH_MAP}" == 'null' ]; then
            echo "::error::deployment-model is 'bbd' but branch-map is empty."
            exit 1
          fi
          BRANCH="${GITHUB_REF_NAME}"

          # 1) Try exact match first — fastest and unambiguous.
          DETECTED_ENV=$(echo "${BRANCH_MAP}" | jq -r --arg b "${BRANCH}" '.[$b] // empty')

          # 2) Fall back to glob patterns. Keys containing `*` are treated as
          # globs (translated to anchored regex with dots escaped). This
          # lets strict GitFlow callers map dynamic branch families:
          #   {"develop":"dev","release/*":"staging","hotfix/*":"prod","main":"prod"}
          # We sort longest-key-first so a specific pattern like
          # `release/hotfix/*` beats `release/*` when both match.
          if [ -z "${DETECTED_ENV}" ]; then
            DETECTED_ENV=$(echo "${BRANCH_MAP}" | jq -r --arg b "${BRANCH}" '
              to_entries
              | map(select(.key | contains("*")))
              | sort_by(.key | length) | reverse
              | map(. as $e | select($b | test("^" + ($e.key | gsub("\\."; "\\\\.") | gsub("\\*"; "[^/]*")) + "$")))
              | (.[0].value // empty)
            ')
            if [ -n "${DETECTED_ENV}" ]; then
              echo "BBD: matched glob pattern in branch-map for '${BRANCH}'"
            fi
          fi

          if [ -z "${DETECTED_ENV}" ]; then
            echo "::error::Branch '${BRANCH}' has no mapping in branch-map: ${BRANCH_MAP}"
            exit 1
          fi
          ENV="${DETECTED_ENV}"
          echo "BBD: resolved environment '${ENV}' from branch '${BRANCH}'"
        fi

        if [ "${DEPLOY_MODEL}" == "tbd-pr" ]; then
          BRANCH_PREFIX="${{ inputs.promote-branch-prefix }}"
          HEAD_REF="${GITHUB_HEAD_REF}"
          if [ -n "${HEAD_REF}" ] && echo "${HEAD_REF}" | grep -qE "^${BRANCH_PREFIX}/[^/]+/"; then
            DETECTED_ENV=$(echo "${HEAD_REF}" | cut -d'/' -f2)
            ENV="${DETECTED_ENV}"
            echo "TBD-PR: detected env '${ENV}' from PR branch '${HEAD_REF}'"
          elif [ -n "${ENV}" ]; then
            echo "TBD-PR: using explicitly provided environment '${ENV}'"
          else
            echo "::error::deployment-model is 'tbd-pr' but environment cannot be determined."
            exit 1
          fi
        fi

        if [ -z "${ENV}" ]; then
          echo "::error::'environment' is required when deployment-model is 'tbd'."
          exit 1
        fi

        echo "Environment: ${ENV}"

        if ! echo "${ENVS}" | jq -e --arg env "${ENV}" 'index($env) != null' > /dev/null; then
          echo "::error::Environment '${ENV}' is not in the environments array: ${ENVS}"
          exit 1
        fi

        PROD_ENV=$(echo "${ENVS}" | jq -r '.[-1]')

        if [ "${ENV}" == "${PROD_ENV}" ]; then
          echo "is_prerelease=false"    >> "$GITHUB_OUTPUT"
          echo "prerelease_identifier=" >> "$GITHUB_OUTPUT"
          echo "Stable release for '${ENV}'"
        else
          IDENTIFIER=$(echo "${IDS}" | jq -r --arg env "${ENV}" '.[$env] // "rc"')
          echo "is_prerelease=true"                  >> "$GITHUB_OUTPUT"
          echo "prerelease_identifier=${IDENTIFIER}" >> "$GITHUB_OUTPUT"
          echo "Prerelease '${IDENTIFIER}' for '${ENV}'"
        fi

        echo "environment=${ENV}" >> "$GITHUB_OUTPUT"

    # ── Manual-release guardrail (release mode only) ───────────────────────
    # Restrict manual workflow_dispatch runs to repo admins, scoped to a
    # threshold environment and everything downstream of it (later in
    # `environments`). The threshold defaults to `@last`, which resolves to
    # the production environment in any naming scheme — so production is
    # protected by default for both TBD and BBD callers.
    #
    # Push and promotion-PR-merge triggers are unaffected. The auth token
    # needs Repository: Administration: Read.
    - name: Repo admin guardrail (manual releases only)
      if: |
        inputs.mode == 'release' &&
        github.event_name == 'workflow_dispatch' &&
        inputs.admin-required-from != ''
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        ACTOR: ${{ github.actor }}
        RAW_THRESHOLD: ${{ inputs.admin-required-from }}
        CURRENT_ENV: ${{ steps.detect-env.outputs.environment }}
        ENVIRONMENTS: ${{ inputs.environments }}
      run: |
        set -euo pipefail

        # Resolve magic threshold values (currently only '@last').
        if [ "${RAW_THRESHOLD}" = "@last" ]; then
          THRESHOLD=$(echo "${ENVIRONMENTS}" | jq -r '.[-1] // empty')
          if [ -z "${THRESHOLD}" ]; then
            echo "::error::admin-required-from='@last' but environments is empty."
            exit 1
          fi
          echo "Threshold '@last' resolved to '${THRESHOLD}' (last entry of ${ENVIRONMENTS})."
        else
          THRESHOLD="${RAW_THRESHOLD}"
        fi

        THRESHOLD_IDX=$(echo "${ENVIRONMENTS}" | jq -r --arg e "${THRESHOLD}" 'index($e) // empty')
        if [ -z "${THRESHOLD_IDX}" ]; then
          echo "::error::admin-required-from='${THRESHOLD}' is not in environments=${ENVIRONMENTS}."
          exit 1
        fi
        if [ -z "${CURRENT_ENV}" ]; then
          echo "::error::Could not resolve current environment for the run."
          exit 1
        fi
        CURRENT_IDX=$(echo "${ENVIRONMENTS}" | jq -r --arg e "${CURRENT_ENV}" 'index($e) // empty')
        if [ -z "${CURRENT_IDX}" ]; then
          echo "::error::Resolved environment '${CURRENT_ENV}' is not in environments=${ENVIRONMENTS}."
          exit 1
        fi

        if [ "${CURRENT_IDX}" -lt "${THRESHOLD_IDX}" ]; then
          echo "Current env '${CURRENT_ENV}' is upstream of threshold '${THRESHOLD}' — guardrail not applied."
          exit 0
        fi

        PERM=$(gh api "/repos/${OWNER}/${REPO}/collaborators/${ACTOR}/permission" \
                 --jq '.permission' 2>/dev/null || echo "")
        if [ -z "${PERM}" ]; then
          echo "::error::Could not check repo permission for ${ACTOR} on ${OWNER}/${REPO}."
          echo "::error::The auth token needs Repository: Administration: Read. With auth-mode: public-app, grant that permission on the Release Runner App and accept it on the installation. To opt out of this guardrail, set admin-required-from: ''."
          exit 1
        fi
        if [ "${PERM}" != "admin" ]; then
          echo "::error::${ACTOR} is not a repo admin on ${OWNER}/${REPO} (permission=${PERM}). Manual releases to '${CURRENT_ENV}' require admin (threshold: '${THRESHOLD}'); merge a promotion PR instead."
          exit 1
        fi
        echo "✓ ${ACTOR} is a repo admin on ${OWNER}/${REPO} — manual release to '${CURRENT_ENV}' allowed."

    - name: Run python-semantic-release
      id: psr
      if: inputs.mode == 'release' && inputs.versioning-tool == 'semantic-release-python'
      uses: python-semantic-release/python-semantic-release@v10
      with:
        github_token: ${{ steps.auth.outputs.token }}
        git_committer_name: github-actions[bot]
        prerelease: ${{ steps.detect-env.outputs.is_prerelease }}
        prerelease_token: ${{ steps.detect-env.outputs.prerelease_identifier }}
        force: ${{ inputs.force-bump }}
        build: false
        changelog: ${{ inputs.changelog }}
        vcs_release: ${{ inputs.create-release }}
        commit: true
        directory: ${{ inputs.working-directory }}

    - name: Set up Node.js (semantic-release-npm)
      if: inputs.mode == 'release' && inputs.versioning-tool == 'semantic-release-npm'
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Run semantic-release (npm)
      id: semrel-npm
      if: inputs.mode == 'release' && inputs.versioning-tool == 'semantic-release-npm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
        GIT_AUTHOR_NAME: github-actions[bot]
        GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
        GIT_COMMITTER_NAME: github-actions[bot]
        GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
      run: |
        set -euo pipefail
        IS_PRERELEASE="${{ steps.detect-env.outputs.is_prerelease }}"
        IDENTIFIER="${{ steps.detect-env.outputs.prerelease_identifier }}"
        PREFIX="${{ inputs.tag-prefix }}"
        PROMOTE_PREFIX="${{ inputs.promote-branch-prefix }}"
        HEAD_REF="${GITHUB_HEAD_REF:-}"

        if ! npx --no semantic-release --version &>/dev/null; then
          npm install --no-save \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/release-notes-generator
        fi

        if [ "${IS_PRERELEASE}" == "true" ]; then
          NEXT_VER=""

          if echo "${HEAD_REF}" | grep -qE "^${PROMOTE_PREFIX}/[^/]+/"; then
            # Promotion PR: derive base version from the branch name.
            # e.g. promote/staging/1.0.0-dev.1 → 1.0.0
            BRANCH_VERSION=$(echo "${HEAD_REF}" | cut -d'/' -f3)
            NEXT_VER=$(echo "${BRANCH_VERSION}" | sed 's/-[a-zA-Z][^.]*\.[0-9]*$//')
            echo "Promotion: base version ${NEXT_VER} from branch ${HEAD_REF}"
          else
            # Direct push to trunk: skip if no new qualifying commits since the
            # last prerelease tag for this identifier (prevents spurious releases
            # when a promotion PR merge commit is the only change).
            LAST_PRE_TAG=$(git tag -l "${PREFIX}*-${IDENTIFIER}.*" 2>/dev/null | sort -V | tail -1 || true)
            if [ -n "${LAST_PRE_TAG}" ]; then
              QUALIFYING=$(git log "${LAST_PRE_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null | \
                grep -cE "^(feat|fix|perf)(\(.+\))?(!)?:" || true)
              if [ "${QUALIFYING:-0}" -eq 0 ]; then
                echo "No qualifying commits since ${LAST_PRE_TAG} — skipping"
                echo "latest_tag=${LAST_PRE_TAG}" >> "$GITHUB_OUTPUT"
                echo "released=false"             >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            # semantic-release v24 ignores --prerelease on stable branches; use
            # dry-run to get the next stable version, then create the tag manually.
            DRY_RUN_OUTPUT=$(npx semantic-release --dry-run 2>&1 || true)
            echo "=== semantic-release dry-run output ==="
            echo "${DRY_RUN_OUTPUT}"
            echo "======================================="
            NEXT_VER=$(echo "${DRY_RUN_OUTPUT}" | \
              grep -iE "the next release version is" | \
              grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          fi

          if [ -n "${NEXT_VER}" ]; then
            PRE_NUM=1
            EXISTING=$(git tag -l "${PREFIX}${NEXT_VER}-${IDENTIFIER}.*" 2>/dev/null | sort -V | tail -1 || true)
            if [ -n "${EXISTING}" ]; then
              LAST_NUM="${EXISTING##*.}"
              PRE_NUM=$(( LAST_NUM + 1 ))
            fi
            NEW_TAG="${PREFIX}${NEXT_VER}-${IDENTIFIER}.${PRE_NUM}"
            echo "Creating prerelease tag: ${NEW_TAG}"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${NEW_TAG}"
            REMOTE_URL=$(git remote get-url origin)
            AUTHED_URL=$(echo "${REMOTE_URL}" | sed "s|https://|https://x-access-token:${GITHUB_TOKEN}@|")
            git push "${AUTHED_URL}" "${NEW_TAG}"
            if [ "${{ inputs.create-release }}" == "true" ]; then
              gh release create "${NEW_TAG}" --prerelease \
                --title "${NEW_TAG}" \
                --notes "Pre-release ${IDENTIFIER}.${PRE_NUM} for version ${NEXT_VER}"
            fi
            echo "latest_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "released=true"         >> "$GITHUB_OUTPUT"
          else
            echo "No relevant commits for prerelease — skipping"
            EXISTING_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "latest_tag=${EXISTING_TAG}" >> "$GITHUB_OUTPUT"
            echo "released=false"             >> "$GITHUB_OUTPUT"
          fi
        else
          if echo "${HEAD_REF}" | grep -qE "^${PROMOTE_PREFIX}/[^/]+/"; then
            # Promotion PR for prod: semantic-release refuses on pull_request events.
            # Extract stable version from branch name and create tag + release manually.
            # e.g. promote/prod/1.0.0-rc.1 → v1.0.0
            BRANCH_VERSION=$(echo "${HEAD_REF}" | cut -d'/' -f3)
            STABLE_VER=$(echo "${BRANCH_VERSION}" | sed 's/-[a-zA-Z][^.]*\.[0-9]*$//')
            NEW_TAG="${PREFIX}${STABLE_VER}"
            echo "Stable release: ${NEW_TAG} from promotion branch ${HEAD_REF}"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${NEW_TAG}"
            REMOTE_URL=$(git remote get-url origin)
            AUTHED_URL=$(echo "${REMOTE_URL}" | sed "s|https://|https://x-access-token:${GITHUB_TOKEN}@|")
            git push "${AUTHED_URL}" "${NEW_TAG}"
            if [ "${{ inputs.create-release }}" == "true" ]; then
              gh release create "${NEW_TAG}" \
                --title "${NEW_TAG}" \
                --generate-notes
            fi
            echo "latest_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
            echo "released=true"         >> "$GITHUB_OUTPUT"
          else
            # Direct push or workflow_dispatch: run semantic-release normally.
            # Use || true so non-critical post-hook failures (e.g. PR label
            # permissions) don't abort the step after the release is published.
            PRE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            npx semantic-release || echo "::warning::semantic-release exited non-zero (release may still have been created)"
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
            if [ -n "${LATEST_TAG}" ] && [ "${LATEST_TAG}" != "${PRE_TAG}" ]; then
              echo "released=true"  >> "$GITHUB_OUTPUT"
            else
              echo "released=false" >> "$GITHUB_OUTPUT"
            fi
          fi
        fi

    - name: Install GitVersion
      if: inputs.mode == 'release' && inputs.versioning-tool == 'gitversion'
      uses: gittools/actions/gitversion/setup@v4
      with:
        versionSpec: ${{ inputs.gitversion-spec }}

    - name: Execute GitVersion
      id: gitversion
      if: inputs.mode == 'release' && inputs.versioning-tool == 'gitversion'
      uses: gittools/actions/gitversion/execute@v4
      with:
        useConfigFile: true
        configFilePath: ${{ inputs.gitversion-config }}
        # GitVersion accepts /overrideconfig flags; map force-bump onto its
        # `increment` knob. Empty force-bump leaves GitVersion's branch
        # rules in charge.
        additionalArguments: |
          ${{
            inputs.force-bump == 'major' && '/overrideconfig increment=Major' ||
            inputs.force-bump == 'minor' && '/overrideconfig increment=Minor' ||
            inputs.force-bump == 'patch' && '/overrideconfig increment=Patch' ||
            ''
          }}

    - name: Create GitVersion release tag
      id: gitversion-tag
      if: inputs.mode == 'release' && inputs.versioning-tool == 'gitversion'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
      run: |
        set -euo pipefail
        IS_PRERELEASE="${{ steps.detect-env.outputs.is_prerelease }}"
        IDENTIFIER="${{ steps.detect-env.outputs.prerelease_identifier }}"
        PREFIX="${{ inputs.tag-prefix }}"
        if [ "${IS_PRERELEASE}" == "true" ]; then
          BASE="${{ steps.gitversion.outputs.majorMinorPatch }}"
          LATEST=$(git tag -l "${PREFIX}${BASE}-${IDENTIFIER}.*" | sort -V | tail -1)
          if [ -z "${LATEST}" ]; then
            PRE_NUM=1
          else
            PRE_NUM=$(echo "${LATEST}" | grep -oE "${IDENTIFIER}\.[0-9]+" | cut -d. -f2)
            PRE_NUM=$((PRE_NUM + 1))
          fi
          VERSION="${BASE}-${IDENTIFIER}.${PRE_NUM}"
        else
          VERSION="${{ steps.gitversion.outputs.majorMinorPatch }}"
        fi
        TAG="${PREFIX}${VERSION}"
        echo "Creating tag: ${TAG}"
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${TAG}" -m "chore(release): ${TAG}"
        REMOTE_URL=$(git remote get-url origin)
        AUTHED_URL=$(echo "${REMOTE_URL}" | sed "s|https://|https://x-access-token:${GITHUB_TOKEN}@|")
        git push "${AUTHED_URL}" "${TAG}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
        if [ "${{ inputs.create-release }}" == "true" ]; then
          IS_PRE_FLAG=""
          [ "${IS_PRERELEASE}" == "true" ] && IS_PRE_FLAG="--prerelease"
          gh release create "${TAG}" --title "${TAG}" --generate-notes ${IS_PRE_FLAG} || true
        fi

    - name: Run release-please
      id: release-please
      if: inputs.mode == 'release' && inputs.versioning-tool == 'release-please'
      uses: googleapis/release-please-action@v5
      with:
        token: ${{ steps.auth.outputs.token }}
        release-type: ${{ inputs.release-please-release-type }}
        config-file: ${{ inputs.release-please-config-file }}

    - name: Normalize outputs
      id: normalize
      if: inputs.mode == 'release'
      shell: bash
      run: |
        set -euo pipefail
        TOOL="${{ inputs.versioning-tool }}"
        PREFIX="${{ inputs.tag-prefix }}"
        VERSION=""
        RELEASED="false"
        TAG=""
        case "${TOOL}" in
          semantic-release-python)
            VERSION="${{ steps.psr.outputs.version }}"
            RELEASED="${{ steps.psr.outputs.released }}"
            TAG="${{ steps.psr.outputs.tag }}"
            ;;
          semantic-release-npm)
            LATEST_TAG="${{ steps.semrel-npm.outputs.latest_tag }}"
            RELEASED="${{ steps.semrel-npm.outputs.released }}"
            if [ -n "${LATEST_TAG}" ]; then
              VERSION="${LATEST_TAG#${PREFIX}}"
              TAG="${LATEST_TAG}"
            fi
            ;;
          gitversion)
            VERSION="${{ steps.gitversion-tag.outputs.version }}"
            TAG="${{ steps.gitversion-tag.outputs.tag }}"
            RELEASED="true"
            ;;
          release-please)
            if [ "${{ steps.release-please.outputs.release_created }}" == "true" ]; then
              TAG="${{ steps.release-please.outputs.tag_name }}"
              VERSION="${TAG#${PREFIX}}"
              RELEASED="true"
            fi
            ;;
        esac
        if [ -z "${VERSION}" ]; then
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "${LATEST}" ]; then
            VERSION="${LATEST#${PREFIX}}"
            TAG="${LATEST}"
          fi
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
        echo "released=${RELEASED}" >> "$GITHUB_OUTPUT"
        echo "Tool: ${TOOL} | Version: ${VERSION} | Tag: ${TAG} | Released: ${RELEASED}"

    # ═════════════════════════════════════════════════════════════════════════
    # RELEASE MODE — Persist version into a tracked file (any tool)
    # ═════════════════════════════════════════════════════════════════════════
    #
    # Common in .NET deployments (e.g. appsettings.json) where the running
    # app needs to know its own version. JSON only; the injection step
    # uses jq and warns-and-skips on non-JSON content. Works with every
    # versioning tool and runs only when a release was created.
    #
    # The push uses the resolved release auth token, so it bypasses branch
    # protection rulesets when the Release Runner App (or your private app)
    # is in the bypass list. The commit message ends with `[skip ci]` so
    # the push does not retrigger the release workflow.

    - name: Inject version into tracked file
      id: version-file-inject
      if: |
        inputs.mode == 'release' &&
        steps.normalize.outputs.released == 'true' &&
        (inputs.version-file != '' || inputs.gitversion-appsettings-file != '')
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.auth.outputs.token }}
      run: |
        set -euo pipefail

        # Prefer the new generic input. Fall back to the deprecated gitversion-prefixed
        # alias so existing callers keep working.
        FILE="${{ inputs.version-file }}"
        JSON_PATH="${{ inputs.version-file-json-path }}"
        if [ -z "${FILE}" ]; then
          FILE="${{ inputs.gitversion-appsettings-file }}"
          if [ -n "${{ inputs.gitversion-appsettings-version-path }}" ]; then
            JSON_PATH="${{ inputs.gitversion-appsettings-version-path }}"
          fi
          echo "::notice::gitversion-appsettings-file is deprecated; use version-file."
        fi

        VERSION="${{ steps.normalize.outputs.version }}"

        if [ ! -f "${FILE}" ]; then
          echo "::warning::version-file '${FILE}' not found — skipping injection."
          exit 0
        fi
        if [ -z "${VERSION}" ]; then
          echo "::warning::No version resolved — skipping injection."
          exit 0
        fi

        # Tolerate a bad path expression or non-JSON content rather than
        # failing the release — version-file is opt-in plumbing and
        # mis-configuring it should warn, not block the publish.
        TMP=$(mktemp)
        if ! jq --arg v "${VERSION}" "${JSON_PATH} = \$v" "${FILE}" > "${TMP}" 2>/tmp/jq.err; then
          echo "::warning::Failed to inject version into ${FILE} at path '${JSON_PATH}': $(cat /tmp/jq.err 2>/dev/null | head -1). Skipping."
          rm -f "${TMP}"
          exit 0
        fi
        if ! mv "${TMP}" "${FILE}"; then
          echo "::warning::Failed to write ${FILE} after injection — skipping."
          exit 0
        fi
        echo "Injected version ${VERSION} into ${FILE} at ${JSON_PATH}"

        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "${FILE}"
        if git diff --cached --quiet; then
          echo "No changes to commit — file already at ${VERSION}."
          exit 0
        fi

        git commit -m "chore(release): persist version ${VERSION} in $(basename "${FILE}") [skip ci]"

        # Best-effort sync to avoid losing the release if the branch moved
        # in parallel (other commits, Flux image bumps, etc.).
        BRANCH="${GITHUB_REF_NAME}"
        git fetch origin "${BRANCH}"
        if ! git rebase "origin/${BRANCH}"; then
          echo "::warning::Could not rebase ${FILE} commit onto latest ${BRANCH}; skipping push."
          git rebase --abort || true
          exit 0
        fi

        REMOTE_URL=$(git remote get-url origin)
        AUTHED_URL=$(echo "${REMOTE_URL}" | sed "s|https://|https://x-access-token:${GITHUB_TOKEN}@|")
        if ! git push "${AUTHED_URL}" "HEAD:${BRANCH}"; then
          echo "::warning::Could not push ${FILE} commit (non-fast-forward or protected branch). Continuing release."
          exit 0
        fi
        echo "Pushed ${FILE} update for ${VERSION} to ${BRANCH}."

    # ═════════════════════════════════════════════════════════════════════════
    # RELEASE MODE — Docker image promotion
    # ═════════════════════════════════════════════════════════════════════════

    - name: Set up Docker Buildx (release)
      if: inputs.mode == 'release' && inputs.image_name != '' && steps.normalize.outputs.released == 'true'
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to GHCR (release)
      if: inputs.mode == 'release' && inputs.image_name != '' && steps.normalize.outputs.released == 'true'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ steps.auth.outputs.registry-token }}

    - name: Promote images
      if: inputs.mode == 'release' && inputs.image_name != '' && steps.normalize.outputs.released == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
        BAKE_GITHUB_TOKEN: ${{ inputs.build-github-token }}
      run: |
        set -euo pipefail

        VERSION="${{ steps.normalize.outputs.version }}"
        TAG="${{ steps.normalize.outputs.tag }}"
        ENV="${{ steps.detect-env.outputs.environment }}"
        IS_PRERELEASE="${{ steps.detect-env.outputs.is_prerelease }}"
        DEPLOY_MODEL="${{ inputs.deployment-model }}"
        ENVS='${{ inputs.environments }}'
        IDS='${{ inputs.prerelease-identifiers }}'
        PREFIX="${{ inputs.tag-prefix }}"

        OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        export IMAGE_NAME="${OWNER_LOWER}/${{ inputs.image_name }}"
        export REGISTRY="${{ inputs.registry }}"
        export VERSION="${VERSION}"
        export PLATFORMS="${{ inputs.platforms }}"

        # Discover all bake targets
        BAKE_OUTPUT=$(docker buildx bake -f "${{ inputs.bake_file }}" "${{ inputs.bake_target }}" --print 2>/dev/null)
        IMAGES=$(echo "${BAKE_OUTPUT}" | jq -c '.target | to_entries | map({target: .key, image: (.value.tags[0] // "" | split(":")[0])})')
        echo "Images to promote: ${IMAGES}"

        # Determine promotion strategy
        IS_FIRST_ENV="false"
        PREV_IDENTIFIER=""
        if [ "${DEPLOY_MODEL}" == "bbd" ]; then
          IS_FIRST_ENV="true"
          echo "BBD: every environment uses its own pr-<N> image"
        else
          FIRST_ENV=$(echo "${ENVS}" | jq -r '.[0]')
          if [ "${ENV}" == "${FIRST_ENV}" ]; then
            IS_FIRST_ENV="true"
            echo "TBD: first environment — will look for pr-<N>"
          else
            ENV_INDEX=$(echo "${ENVS}" | jq -r --arg e "${ENV}" 'index($e)')
            PREV_ENV=$(echo "${ENVS}" | jq -r --argjson i "${ENV_INDEX}" '.[$i - 1]')
            PREV_IDENTIFIER=$(echo "${IDS}" | jq -r --arg e "${PREV_ENV}" '.[$e] // "dev"')
            echo "TBD: subsequent environment — will retag from ${PREV_IDENTIFIER} version"
          fi
        fi

        # Resolve source tag suffix
        SOURCE_TAG_SUFFIX=""
        if [ "${IS_FIRST_ENV}" == "true" ]; then
          # Find the PR associated with this release tag via GitHub API
          COMMIT_SHA=$(gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" \
            --jq 'if .object.type == "tag" then .object.sha else .object.sha end' 2>/dev/null || echo "")

          if [ -n "${COMMIT_SHA}" ]; then
            # Resolve annotated tag to commit
            TAG_TYPE=$(gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" --jq '.object.type' 2>/dev/null || echo "commit")
            if [ "${TAG_TYPE}" == "tag" ]; then
              COMMIT_SHA=$(gh api "repos/${{ github.repository }}/git/tags/${COMMIT_SHA}" --jq '.object.sha' 2>/dev/null || echo "${COMMIT_SHA}")
            fi

            PR_NUMBER=""
            CURRENT_SHA="${COMMIT_SHA}"
            for _ in 1 2 3 4 5; do
              PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${CURRENT_SHA}/pulls" \
                --jq '[.[] | select(.merged_at != null)] | .[0].number // empty' 2>/dev/null || echo "")
              [ -n "${PR_NUMBER}" ] && break
              # Check commit message for PR reference
              MSG_PR=$(gh api "repos/${{ github.repository }}/commits/${CURRENT_SHA}" \
                --jq '.commit.message' 2>/dev/null | grep -oE '\(#[0-9]+\)|Merge pull request #[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "")
              if [ -n "${MSG_PR}" ]; then
                PR_NUMBER="${MSG_PR}"
                break
              fi
              CURRENT_SHA=$(gh api "repos/${{ github.repository }}/commits/${CURRENT_SHA}" \
                --jq '.parents[0].sha // empty' 2>/dev/null || echo "")
              [ -z "${CURRENT_SHA}" ] && break
            done

            if [ -n "${PR_NUMBER}" ]; then
              SOURCE_TAG_SUFFIX="pr-${PR_NUMBER}"
              echo "Source: pr-${PR_NUMBER}"
            else
              echo "::warning::Could not find PR for tag ${TAG} — will fall back to fresh build"
            fi
          fi
        else
          # Find latest tag with the previous environment's identifier
          BASE_VERSION=$(echo "${VERSION}" | sed 's/-[a-zA-Z][^.]*\.[0-9]*$//')
          SEARCH_PREFIX="${PREFIX}${BASE_VERSION}-${PREV_IDENTIFIER}."
          SOURCE_TAG_SUFFIX=$(gh api "repos/${{ github.repository }}/git/matching-refs/tags/${SEARCH_PREFIX}" \
            --jq '[.[].ref | ltrimstr("refs/tags/")] | sort_by(ltrimstr("'"${PREFIX}${BASE_VERSION}-${PREV_IDENTIFIER}."'") | tonumber) | last // empty' \
            2>/dev/null || echo "")
          if [ -n "${SOURCE_TAG_SUFFIX}" ]; then
            echo "Source tag: ${SOURCE_TAG_SUFFIX}"
          else
            echo "::warning::No tag found matching ${SEARCH_PREFIX}* — will fall back to fresh build"
          fi
        fi

        # Promote each image
        echo "${IMAGES}" | jq -c '.[]' | while IFS= read -r item; do
          TARGET=$(echo "${item}" | jq -r '.target')
          IMAGE=$(echo "${item}" | jq -r '.image')
          NEW_TAG="${IMAGE}:${TAG}"

          PROMOTED="false"
          if [ -n "${SOURCE_TAG_SUFFIX}" ]; then
            SOURCE="${IMAGE}:${SOURCE_TAG_SUFFIX}"
            SOURCE_DIGEST=$(docker buildx imagetools inspect "${SOURCE}" \
              --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")

            if [ -n "${SOURCE_DIGEST}" ]; then
              if [ "${IS_PRERELEASE}" == "false" ]; then
                docker buildx imagetools create --tag "${NEW_TAG}" --tag "${IMAGE}:latest" "${SOURCE}"
                echo "Promoted ${SOURCE} → ${NEW_TAG} + :latest"
              else
                docker buildx imagetools create --tag "${NEW_TAG}" "${SOURCE}"
                echo "Promoted ${SOURCE} → ${NEW_TAG}"
              fi
              PROMOTED="true"
            else
              echo "Source not found: ${SOURCE}"
            fi
          fi

          if [ "${PROMOTED}" == "false" ]; then
            echo "Fresh build fallback for ${IMAGE} (${TARGET})"
            EXTRA_TAGS=""
            [ "${IS_PRERELEASE}" == "false" ] && EXTRA_TAGS="--set ${TARGET}.tags=${IMAGE}:latest"
            docker buildx bake \
              -f "${{ inputs.bake_file }}" "${TARGET}" \
              --set "${TARGET}.tags=${NEW_TAG}" \
              ${EXTRA_TAGS} \
              --set "${TARGET}.cache-from=type=gha,scope=buildkit-${TARGET}" \
              --set "${TARGET}.cache-to=type=gha,mode=max,scope=buildkit-${TARGET}" \
              --push
          fi
        done

    # ═════════════════════════════════════════════════════════════════════════
    # RELEASE MODE — Promotion PR (tbd-pr model, opt-in)
    # ═════════════════════════════════════════════════════════════════════════

    - name: Create promotion PR
      if: |
        inputs.mode == 'release' &&
        inputs.create-promotion-pr == 'true' &&
        inputs.deployment-model == 'tbd-pr' &&
        steps.normalize.outputs.released == 'true' &&
        steps.detect-env.outputs.is_prerelease == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
      run: |
        set -euo pipefail

        VERSION="${{ steps.normalize.outputs.version }}"
        TAG="${{ steps.normalize.outputs.tag }}"
        ENV="${{ steps.detect-env.outputs.environment }}"
        PRERELEASE_IDENTIFIER="${{ steps.detect-env.outputs.prerelease_identifier }}"
        ENVS='${{ inputs.environments }}'
        PREFIX="${{ inputs.promote-branch-prefix }}"
        TARGET="${{ inputs.promote-target-branch }}"

        LAST_ENV=$(echo "${ENVS}" | jq -r '.[-1]')
        if [ "${ENV}" == "${LAST_ENV}" ]; then
          echo "Already at last environment — no promotion PR needed"
          exit 0
        fi

        ENV_INDEX=$(echo "${ENVS}" | jq -r --arg e "${ENV}" 'index($e)')
        NEXT_ENV=$(echo "${ENVS}" | jq -r --argjson i "${ENV_INDEX}" '.[$i + 1]')
        BRANCH="${PREFIX}/${NEXT_ENV}/${VERSION}"

        echo "Creating promotion PR: ${BRANCH} → ${TARGET}"

        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b "${BRANCH}"

        mkdir -p .github/promotions
        printf 'Promote %s to %s.\n' "${TAG}" "${NEXT_ENV}" > ".github/promotions/${VERSION}-to-${NEXT_ENV}.md"

        git add ".github/promotions/${VERSION}-to-${NEXT_ENV}.md"
        git commit -m "chore(release): promote ${TAG} to ${NEXT_ENV}"

        REMOTE_URL=$(git remote get-url origin)
        AUTHED_URL=$(echo "${REMOTE_URL}" | sed "s|https://|https://x-access-token:${GH_TOKEN}@|")
        git push "${AUTHED_URL}" "${BRANCH}"

        # Build a rich body so reviewers see the originating PR, the
        # full PR list in the range, and the source/target environments
        # without clicking through. Falls back to a one-line body if
        # the script errors for any reason — never block PR creation.
        BODY_FILE=$(mktemp)
        if env \
            GH_TOKEN="${GH_TOKEN}" \
            OWNER="${OWNER}" REPO="${REPO}" \
            TAG="${TAG}" VERSION="${VERSION}" \
            ENV="${ENV}" NEXT_ENV="${NEXT_ENV}" \
            PRERELEASE_IDENTIFIER="${PRERELEASE_IDENTIFIER}" \
            "${GITHUB_ACTION_PATH}/scripts/build-promotion-pr-body.sh" > "${BODY_FILE}" 2>/dev/null \
            && [ -s "${BODY_FILE}" ]; then
          echo "Using enriched PR body ($(wc -l < "${BODY_FILE}") lines)."
        else
          echo "::warning::Could not render enriched PR body — falling back to one-liner."
          printf 'Merging this PR will trigger the **%s** release for `%s`.\n' \
            "${NEXT_ENV}" "${TAG}" > "${BODY_FILE}"
        fi

        PR_URL=$(gh pr create \
          --title "chore(release): promote ${TAG} to ${NEXT_ENV}" \
          --body-file "${BODY_FILE}" \
          --base "${TARGET}" \
          --head "${BRANCH}") || { echo "::warning::PR already exists for ${BRANCH}"; exit 0; }
        gh pr edit "${PR_URL}" --add-label "promotion" 2>/dev/null || true

    # ═════════════════════════════════════════════════════════════════════════
    # RELEASE MODE — GitHub Projects aggregation (opt-in)
    # ═════════════════════════════════════════════════════════════════════════
    #
    # After a release publishes, walk commits + linked PRs in the release
    # range, collect issue/PR refs (#NNN), look up each ref's Projects v2
    # membership, and append a "## GitHub Project items" section to the
    # release notes (and any open promotion PR body for this tag).
    #
    # Purely additive — never fails the release on its own. Requires a
    # token with org-scoped Projects v2 read; see the input docs.

    - name: Append GitHub Project items to release docs
      if: |
        inputs.mode == 'release' &&
        inputs.aggregate-github-projects == 'true' &&
        steps.normalize.outputs.released == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        TAG: ${{ steps.normalize.outputs.tag }}
        PRERELEASE_IDENTIFIER: ${{ steps.detect-env.outputs.prerelease_identifier }}
      run: "${GITHUB_ACTION_PATH}/scripts/append-github-projects.sh"

    # ═════════════════════════════════════════════════════════════════════════
    # RELEASE MODE — ClickUp ticket aggregation (opt-in)
    # ═════════════════════════════════════════════════════════════════════════

    - name: Append ClickUp tickets to release docs
      if: |
        inputs.mode == 'release' &&
        inputs.aggregate-clickup-tickets == 'true' &&
        steps.normalize.outputs.released == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        TAG: ${{ steps.normalize.outputs.tag }}
        PRERELEASE_IDENTIFIER: ${{ steps.detect-env.outputs.prerelease_identifier }}
      run: "${GITHUB_ACTION_PATH}/scripts/append-clickup-tickets.sh"

    # ═════════════════════════════════════════════════════════════════════════
    # RELEASE MODE — GitHub Projects auto-move (opt-in)
    # ═════════════════════════════════════════════════════════════════════════
    #
    # Move every Projects v2 item linked to issues/PRs in the release range
    # to a target Status (e.g. "Released"). Off by default. Restricted to
    # the production environment unless `github-projects-move-on-environments`
    # widens the scope. Requires a token with org-scoped Projects v2 write.

    - name: Resolve Projects move scope
      id: projects-move-scope
      if: |
        inputs.mode == 'release' &&
        inputs.move-github-projects-on-release == 'true' &&
        steps.normalize.outputs.released == 'true'
      shell: bash
      env:
        ENVS: ${{ inputs.environments }}
        SCOPE_RAW: ${{ inputs.github-projects-move-on-environments }}
        CURRENT_ENV: ${{ steps.detect-env.outputs.environment }}
      run: |
        set -euo pipefail
        if [ "${SCOPE_RAW}" = "@last" ] || [ -z "${SCOPE_RAW}" ]; then
          ALLOWED=$(echo "${ENVS}" | jq -c '[.[-1]]')
        elif [ "${SCOPE_RAW}" = "[]" ]; then
          ALLOWED="${ENVS}"
        else
          ALLOWED="${SCOPE_RAW}"
        fi
        if echo "${ALLOWED}" | jq -e --arg e "${CURRENT_ENV}" 'index($e) != null' >/dev/null; then
          echo "should-run=true" >> "$GITHUB_OUTPUT"
          echo "Auto-move enabled for '${CURRENT_ENV}' (allowed: ${ALLOWED})"
        else
          echo "should-run=false" >> "$GITHUB_OUTPUT"
          echo "Auto-move skipped for '${CURRENT_ENV}' (not in ${ALLOWED})"
        fi

    - name: Move GitHub Project items to target status
      if: |
        steps.projects-move-scope.outputs.should-run == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.auth.outputs.token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        TAG: ${{ steps.normalize.outputs.tag }}
        PRERELEASE_IDENTIFIER: ${{ steps.detect-env.outputs.prerelease_identifier }}
        TARGET_STATUS: ${{ inputs.github-projects-target-status }}
      run: "${GITHUB_ACTION_PATH}/scripts/move-github-projects.sh"
