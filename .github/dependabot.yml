version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ['*']
  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: weekly
    groups:
      worker-npm:
        patterns: ['*']
