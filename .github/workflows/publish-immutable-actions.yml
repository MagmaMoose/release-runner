name: 'Publish Immutable Action Version'

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Publish immutable package
        id: publish
        uses: actions/publish-immutable-action@v0.0.4
