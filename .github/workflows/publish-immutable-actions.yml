name: 'Publish Immutable Action Version'

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Publish immutable package
        id: publish
        uses: actions/publish-immutable-action@v0.0.4
