name: TBD Release — Version & Promote

# Thin wrapper around calebsargeant/semantic-release@v1 (mode: release).
# Prefer using the action directly for full control:
#
#   jobs:
#     release:
#       runs-on: ubuntu-latest
#       permissions:
#         contents: write
#         packages: write
#         pull-requests: write
#       steps:
#         - uses: calebsargeant/semantic-release@v1
#           with:
#             mode: release
#             deployment-model: tbd-pr
#             create-promotion-pr: 'true'
#             github-token: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_call:
    inputs:

      # ── Versioning tool ──────────────────────────────────────────────────────
      versioning-tool:
        required: false
        type: string
        default: 'semantic-release-python'

      # ── Environment model ────────────────────────────────────────────────────
      environment:
        required: false
        type: string
        default: ''
      environments:
        required: false
        type: string
        default: '["dev", "staging", "prod"]'
      prerelease-identifiers:
        required: false
        type: string
        default: '{"dev": "dev", "staging": "rc"}'
      tag-prefix:
        required: false
        type: string
        default: 'v'

      # ── Deployment model ─────────────────────────────────────────────────────
      deployment-model:
        required: false
        type: string
        default: 'tbd'
      branch-map:
        required: false
        type: string
        default: ''
      promote-branch-prefix:
        required: false
        type: string
        default: 'promote'
      create-promotion-pr:
        description: 'Create the next environment promotion PR after a prerelease (tbd-pr only)'
        required: false
        type: boolean
        default: false

      # ── Common options ───────────────────────────────────────────────────────
      working-directory:
        required: false
        type: string
        default: '.'
      create-release:
        required: false
        type: boolean
        default: true
      changelog:
        required: false
        type: boolean
        default: true

      # ── Docker image promotion ───────────────────────────────────────────────
      image_name:
        required: false
        type: string
        default: ''
      bake_file:
        required: false
        type: string
        default: 'docker-bake.hcl'
      bake_target:
        required: false
        type: string
        default: 'default'
      registry:
        required: false
        type: string
        default: 'ghcr.io'
      platforms:
        required: false
        type: string
        default: 'linux/amd64'

      # ── GitVersion specific ──────────────────────────────────────────────────
      gitversion-spec:
        required: false
        type: string
        default: '6.x'
      gitversion-config:
        required: false
        type: string
        default: 'GitVersion.yml'
      gitversion-appsettings-file:
        required: false
        type: string
        default: ''
      gitversion-appsettings-version-path:
        required: false
        type: string
        default: '.Application.Version'

      # ── release-please specific ──────────────────────────────────────────────
      release-please-release-type:
        required: false
        type: string
        default: 'simple'
      release-please-config-file:
        required: false
        type: string
        default: 'release-please-config.json'

      # ── Runner ───────────────────────────────────────────────────────────────
      runner:
        required: false
        type: string
        default: 'ubuntu-latest'

    outputs:
      version:
        description: 'Version string (e.g., 1.2.3 or 1.2.3-rc.1)'
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: 'Git tag (e.g., v1.2.3 or v1.2.3-rc.1)'
        value: ${{ jobs.release.outputs.tag }}
      is-prerelease:
        description: '"true" if this is a prerelease'
        value: ${{ jobs.release.outputs.is-prerelease }}
      released:
        description: '"true" if a new version was published'
        value: ${{ jobs.release.outputs.released }}
      prerelease-identifier:
        description: 'The prerelease identifier (e.g., dev, rc). Empty for production.'
        value: ${{ jobs.release.outputs.prerelease-identifier }}
      resolved-environment:
        description: 'The environment that was targeted'
        value: ${{ jobs.release.outputs.resolved-environment }}

    secrets:
      GITHUB_TOKEN_RELEASE:
        required: false
      SEMANTIC_RELEASE_APP_ID:
        required: false
      SEMANTIC_RELEASE_APP_PRIVATE_KEY:
        required: false

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  release:
    name: Release (${{ inputs.environment || 'auto' }})
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    outputs:
      version:              ${{ steps.tbd.outputs.version }}
      tag:                  ${{ steps.tbd.outputs.tag }}
      is-prerelease:        ${{ steps.tbd.outputs.is-prerelease }}
      released:             ${{ steps.tbd.outputs.released }}
      prerelease-identifier: ${{ steps.tbd.outputs.prerelease-identifier }}
      resolved-environment: ${{ steps.tbd.outputs.resolved-environment }}
    steps:
      - uses: calebsargeant/semantic-release@main
        id: tbd
        with:
          mode:                        release
          versioning-tool:             ${{ inputs.versioning-tool }}
          environment:                 ${{ inputs.environment }}
          environments:                ${{ inputs.environments }}
          prerelease-identifiers:      ${{ inputs.prerelease-identifiers }}
          tag-prefix:                  ${{ inputs.tag-prefix }}
          deployment-model:            ${{ inputs.deployment-model }}
          branch-map:                  ${{ inputs.branch-map }}
          promote-branch-prefix:       ${{ inputs.promote-branch-prefix }}
          create-promotion-pr:         ${{ inputs.create-promotion-pr }}
          working-directory:           ${{ inputs.working-directory }}
          create-release:              ${{ inputs.create-release }}
          changelog:                   ${{ inputs.changelog }}
          image_name:                  ${{ inputs.image_name }}
          bake_file:                   ${{ inputs.bake_file }}
          bake_target:                 ${{ inputs.bake_target }}
          registry:                    ${{ inputs.registry }}
          platforms:                   ${{ inputs.platforms }}
          gitversion-spec:             ${{ inputs.gitversion-spec }}
          gitversion-config:           ${{ inputs.gitversion-config }}
          gitversion-appsettings-file: ${{ inputs.gitversion-appsettings-file }}
          gitversion-appsettings-version-path: ${{ inputs.gitversion-appsettings-version-path }}
          release-please-release-type: ${{ inputs.release-please-release-type }}
          release-please-config-file:  ${{ inputs.release-please-config-file }}
          github-token:                ${{ secrets.GITHUB_TOKEN_RELEASE || secrets.GITHUB_TOKEN }}
          app-id:                      ${{ secrets.SEMANTIC_RELEASE_APP_ID }}
          app-private-key:             ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}
