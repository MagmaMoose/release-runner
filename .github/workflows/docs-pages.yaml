name: Docs Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'scripts/generate-action-reference.py'
      - 'docs/**'
      - '.github/workflows/docs-pages.yaml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          # For first-time setup, provide a repository/org secret named
          # PAGES_ENABLEMENT_TOKEN (PAT or GitHub App token with required scopes)
          # to auto-enable Pages. Without it, Pages must already be enabled.
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' && secrets.PAGES_ENABLEMENT_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' && 'true' || 'false' }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt
      - name: Generate action reference docs
        run: python scripts/generate-action-reference.py

      - name: Build MkDocs site
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
