name: TBD Deploy — Google Cloud Run

# Reusable workflow: on a GitHub Release event, promotes the GHCR PR image to
# the release version tag, mirrors it to Google Artifact Registry, then deploys
# to Cloud Run. Caller triggers this on release: [published].
#
# Two-phase execution:
#   1. promote  — retags pr-<N> image in GHCR to the release version (no rebuild)
#   2. deploy   — mirrors GHCR image to GAR, runs gcloud run deploy
#
# Why mirror to GAR? Cloud Run (fully managed) cannot pull directly from private
# GHCR. GAR is in the same GCP project so the Cloud Run service account already
# has access. GHCR remains the canonical registry for the TBD pipeline.

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Docker image name (without registry prefix). Must match what was used in tbd-ci.'
        required: true
        type: string
      bake_file:
        description: 'Path to docker-bake.hcl'
        required: false
        type: string
        default: 'docker-bake.hcl'
      bake_target:
        description: 'Docker Bake target. Must match what was used in tbd-ci.'
        required: false
        type: string
        default: 'default'
      service:
        description: 'Cloud Run service name'
        required: true
        type: string
      project_id:
        description: 'GCP project ID'
        required: true
        type: string
      region:
        description: 'GCP region'
        required: false
        type: string
        default: 'africa-south1'
      gar_image:
        description: >
          Full GAR image path WITHOUT tag.
          Format: <region>-docker.pkg.dev/<project>/<repository>/<image-name>
          Example: africa-south1-docker.pkg.dev/my-project/my-repo/api
        required: true
        type: string
      port:
        description: 'Container port'
        required: false
        type: string
        default: '8080'
      cpu:
        description: 'CPU allocation'
        required: false
        type: string
        default: '1'
      memory:
        description: 'Memory allocation'
        required: false
        type: string
        default: '512Mi'
      min_instances:
        description: 'Minimum instances (0 = scale to zero)'
        required: false
        type: string
        default: '0'
      max_instances:
        description: 'Maximum instances'
        required: false
        type: string
        default: '10'
      concurrency:
        description: 'Max concurrent requests per instance'
        required: false
        type: string
        default: '80'
      timeout:
        description: 'Request timeout (seconds)'
        required: false
        type: string
        default: '300'
      allow_unauthenticated:
        description: 'Allow unauthenticated (public) requests'
        required: false
        type: boolean
        default: true
      service_account:
        description: 'Service account email for the Cloud Run service identity'
        required: false
        type: string
        default: ''
      env_vars:
        description: 'Environment variables as KEY=VALUE,KEY2=VALUE2'
        required: false
        type: string
        default: ''
      gcloud_secrets:
        description: 'Secret Manager bindings as KEY=SECRET_NAME:VERSION,KEY2=SECRET2:latest'
        required: false
        type: string
        default: ''
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
      version_type:
        description: >
          Which release tags this deployment accepts: stable, prerelease, or any.
          Production deployments should use stable; staging deployments usually
          use prerelease with prerelease_identifier.
        required: false
        type: string
        default: 'stable'
      prerelease_identifier:
        description: 'Required when version_type is prerelease (e.g., rc).'
        required: false
        type: string
        default: ''
    outputs:
      url:
        description: 'Deployed Cloud Run service URL'
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      GCP_CREDENTIALS:
        description: 'GCP service account credentials JSON'
        required: true

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ${{ inputs.runner }}
    outputs:
      url: ${{ steps.cloud-run-deploy.outputs.url }}
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release tag
        id: release-tag
        shell: bash
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          INPUT_VERSION_TYPE: ${{ inputs.version_type }}
          INPUT_PRERELEASE_IDENTIFIER: ${{ inputs.prerelease_identifier }}
        run: |
          set -euo pipefail

          TAG="${RELEASE_TAG_NAME}"
          VERSION_TYPE="${INPUT_VERSION_TYPE}"
          IDENTIFIER="${INPUT_PRERELEASE_IDENTIFIER}"

          if [ -z "${TAG}" ]; then
            echo "::error::Release tag is empty; refusing to deploy."
            exit 1
          fi

          case "${VERSION_TYPE}" in
            stable)
              if [[ "${TAG}" == *-* ]]; then
                echo "::error::Release tag '${TAG}' is a prerelease but this deployment accepts stable tags only."
                exit 1
              fi
              ;;
            prerelease)
              if [ -z "${IDENTIFIER}" ]; then
                echo "::error::version_type prerelease requires prerelease_identifier."
                exit 1
              fi
              if [[ ! "${TAG}" =~ -${IDENTIFIER}\.[0-9]+$ ]]; then
                echo "::error::Release tag '${TAG}' does not match prerelease identifier '${IDENTIFIER}'."
                exit 1
              fi
              ;;
            any)
              ;;
            *)
              echo "::error::Unsupported version_type '${VERSION_TYPE}'. Use stable, prerelease, or any."
              exit 1
              ;;
          esac

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag '${TAG}' accepted for ${VERSION_TYPE} deployment."

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ inputs.project_id }}

      - name: Configure Docker for GAR
        shell: bash
        env:
          INPUT_REGION: ${{ inputs.region }}
        run: gcloud auth configure-docker "${INPUT_REGION}-docker.pkg.dev" --quiet

      - name: Resolve GHCR image reference
        id: resolve-image
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          INPUT_IMAGE_NAME: ${{ inputs.image_name }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail

          OWNER_LOWER=$(echo "${OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER_LOWER}/${INPUT_IMAGE_NAME}"
          REGISTRY="ghcr.io"

          TAG="${RELEASE_TAG}"

          GHCR_IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved GHCR image: ${GHCR_IMAGE}"

      - name: Mirror image from GHCR to GAR
        id: mirror
        shell: bash
        env:
          RESOLVED_GHCR_IMAGE: ${{ steps.resolve-image.outputs.ghcr_image }}
          RESOLVED_IMAGE_TAG: ${{ steps.resolve-image.outputs.image_tag }}
          INPUT_GAR_IMAGE: ${{ inputs.gar_image }}
        run: |
          set -euo pipefail

          GHCR_IMAGE="${RESOLVED_GHCR_IMAGE}"
          IMAGE_TAG="${RESOLVED_IMAGE_TAG}"
          GAR_FULL_IMAGE="${INPUT_GAR_IMAGE}:${IMAGE_TAG}"

          echo "Mirroring ${GHCR_IMAGE} → ${GAR_FULL_IMAGE}"
          docker buildx imagetools create --tag "${GAR_FULL_IMAGE}" "${GHCR_IMAGE}"

          echo "gar_full_image=${GAR_FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Mirrored successfully."

      - name: Deploy to Cloud Run
        id: cloud-run-deploy
        shell: bash
        env:
          INPUT_SERVICE: ${{ inputs.service }}
          INPUT_REGION: ${{ inputs.region }}
          INPUT_PORT: ${{ inputs.port }}
          INPUT_CPU: ${{ inputs.cpu }}
          INPUT_MEMORY: ${{ inputs.memory }}
          INPUT_MIN_INSTANCES: ${{ inputs.min_instances }}
          INPUT_MAX_INSTANCES: ${{ inputs.max_instances }}
          INPUT_CONCURRENCY: ${{ inputs.concurrency }}
          INPUT_TIMEOUT: ${{ inputs.timeout }}
          INPUT_ALLOW_UNAUTHENTICATED: ${{ inputs.allow_unauthenticated }}
          INPUT_SERVICE_ACCOUNT: ${{ inputs.service_account }}
          INPUT_ENV_VARS: ${{ inputs.env_vars }}
          INPUT_GCLOUD_SECRETS: ${{ inputs.gcloud_secrets }}
          MIRROR_GAR_FULL_IMAGE: ${{ steps.mirror.outputs.gar_full_image }}
        run: |
          set -euo pipefail

          CMD=(
            gcloud run deploy "${INPUT_SERVICE}"
            "--image=${MIRROR_GAR_FULL_IMAGE}"
            "--region=${INPUT_REGION}"
            --platform=managed
            "--port=${INPUT_PORT}"
            "--cpu=${INPUT_CPU}"
            "--memory=${INPUT_MEMORY}"
            "--min-instances=${INPUT_MIN_INSTANCES}"
            "--max-instances=${INPUT_MAX_INSTANCES}"
            "--concurrency=${INPUT_CONCURRENCY}"
            "--timeout=${INPUT_TIMEOUT}"
            --quiet
          )

          if [[ "${INPUT_ALLOW_UNAUTHENTICATED}" == "true" ]]; then
            CMD+=(--allow-unauthenticated)
          else
            CMD+=(--no-allow-unauthenticated)
          fi

          if [[ -n "${INPUT_SERVICE_ACCOUNT}" ]]; then
            CMD+=("--service-account=${INPUT_SERVICE_ACCOUNT}")
          fi

          if [[ -n "${INPUT_ENV_VARS}" ]]; then
            CMD+=("--set-env-vars=${INPUT_ENV_VARS}")
          fi

          if [[ -n "${INPUT_GCLOUD_SECRETS}" ]]; then
            CMD+=("--update-secrets=${INPUT_GCLOUD_SECRETS}")
          fi

          echo "Deploying to Cloud Run..."
          "${CMD[@]}"

          URL=$(gcloud run services describe "${INPUT_SERVICE}" \
            "--region=${INPUT_REGION}" \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed: ${URL}"
