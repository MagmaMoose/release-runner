name: TBD Deploy — Google Cloud Run

# Reusable workflow: on a GitHub Release event, promotes the GHCR PR image to
# the release version tag, mirrors it to Google Artifact Registry, then deploys
# to Cloud Run. Caller triggers this on release: [published].
#
# Two-phase execution:
#   1. promote  — retags pr-<N> image in GHCR to the release version (no rebuild)
#   2. deploy   — mirrors GHCR image to GAR, runs gcloud run deploy
#
# Why mirror to GAR? Cloud Run (fully managed) cannot pull directly from private
# GHCR. GAR is in the same GCP project so the Cloud Run service account already
# has access. GHCR remains the canonical registry for the TBD pipeline.

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Docker image name (without registry prefix). Must match what was used in tbd-ci.'
        required: true
        type: string
      bake_file:
        description: 'Path to docker-bake.hcl'
        required: false
        type: string
        default: 'docker-bake.hcl'
      bake_target:
        description: 'Docker Bake target. Must match what was used in tbd-ci.'
        required: false
        type: string
        default: 'default'
      service:
        description: 'Cloud Run service name'
        required: true
        type: string
      project_id:
        description: 'GCP project ID'
        required: true
        type: string
      region:
        description: 'GCP region'
        required: false
        type: string
        default: 'africa-south1'
      gar_image:
        description: >
          Full GAR image path WITHOUT tag.
          Format: <region>-docker.pkg.dev/<project>/<repository>/<image-name>
          Example: africa-south1-docker.pkg.dev/my-project/my-repo/api
        required: true
        type: string
      port:
        description: 'Container port'
        required: false
        type: string
        default: '8080'
      cpu:
        description: 'CPU allocation'
        required: false
        type: string
        default: '1'
      memory:
        description: 'Memory allocation'
        required: false
        type: string
        default: '512Mi'
      min_instances:
        description: 'Minimum instances (0 = scale to zero)'
        required: false
        type: string
        default: '0'
      max_instances:
        description: 'Maximum instances'
        required: false
        type: string
        default: '10'
      concurrency:
        description: 'Max concurrent requests per instance'
        required: false
        type: string
        default: '80'
      timeout:
        description: 'Request timeout (seconds)'
        required: false
        type: string
        default: '300'
      allow_unauthenticated:
        description: 'Allow unauthenticated (public) requests'
        required: false
        type: boolean
        default: true
      service_account:
        description: 'Service account email for the Cloud Run service identity'
        required: false
        type: string
        default: ''
      env_vars:
        description: 'Environment variables as KEY=VALUE,KEY2=VALUE2'
        required: false
        type: string
        default: ''
      gcloud_secrets:
        description: 'Secret Manager bindings as KEY=SECRET_NAME:VERSION,KEY2=SECRET2:latest'
        required: false
        type: string
        default: ''
      runner:
        description: 'GitHub Actions runner label'
        required: false
        type: string
        default: 'ubuntu-latest'
      version_branch_mapping:
        description: >
          JSON object mapping branches to version types for image promotion.
          For a single-trunk TBD setup: {"main": {"type": "stable"}}
          For tri-env: {"main": {"type": "stable"}, "staging": {"type": "prerelease", "identifier": "rc"}}
        required: false
        type: string
        default: '{"main": {"type": "stable"}}'
    outputs:
      url:
        description: 'Deployed Cloud Run service URL'
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      GCP_CREDENTIALS:
        description: 'GCP service account credentials JSON'
        required: true

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ${{ inputs.runner }}
    outputs:
      url: ${{ steps.cloud-run-deploy.outputs.url }}
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ inputs.project_id }}

      - name: Configure Docker for GAR
        shell: bash
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev --quiet

      - name: Resolve GHCR image reference
        id: resolve-image
        shell: bash
        run: |
          set -euo pipefail

          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${OWNER_LOWER}/${{ inputs.image_name }}"
          REGISTRY="ghcr.io"

          # Determine version from release event tag
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "${TAG}" ]; then
            # Fallback: use the latest git tag
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi

          GHCR_IMAGE="${REGISTRY}/${IMAGE_NAME}:${TAG}"
          echo "ghcr_image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved GHCR image: ${GHCR_IMAGE}"

      - name: Mirror image from GHCR to GAR
        id: mirror
        shell: bash
        run: |
          set -euo pipefail

          GHCR_IMAGE="${{ steps.resolve-image.outputs.ghcr_image }}"
          IMAGE_TAG="${{ steps.resolve-image.outputs.image_tag }}"
          GAR_FULL_IMAGE="${{ inputs.gar_image }}:${IMAGE_TAG}"

          echo "Mirroring ${GHCR_IMAGE} → ${GAR_FULL_IMAGE}"
          docker buildx imagetools create --tag "${GAR_FULL_IMAGE}" "${GHCR_IMAGE}"

          echo "gar_full_image=${GAR_FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Mirrored successfully."

      - name: Deploy to Cloud Run
        id: cloud-run-deploy
        shell: bash
        run: |
          set -euo pipefail

          CMD=(
            gcloud run deploy "${{ inputs.service }}"
            "--image=${{ steps.mirror.outputs.gar_full_image }}"
            "--region=${{ inputs.region }}"
            --platform=managed
            "--port=${{ inputs.port }}"
            "--cpu=${{ inputs.cpu }}"
            "--memory=${{ inputs.memory }}"
            "--min-instances=${{ inputs.min_instances }}"
            "--max-instances=${{ inputs.max_instances }}"
            "--concurrency=${{ inputs.concurrency }}"
            "--timeout=${{ inputs.timeout }}"
            --quiet
          )

          if [[ "${{ inputs.allow_unauthenticated }}" == "true" ]]; then
            CMD+=(--allow-unauthenticated)
          else
            CMD+=(--no-allow-unauthenticated)
          fi

          if [[ -n "${{ inputs.service_account }}" ]]; then
            CMD+=("--service-account=${{ inputs.service_account }}")
          fi

          if [[ -n "${{ inputs.env_vars }}" ]]; then
            CMD+=("--set-env-vars=${{ inputs.env_vars }}")
          fi

          if [[ -n "${{ inputs.gcloud_secrets }}" ]]; then
            CMD+=("--update-secrets=${{ inputs.gcloud_secrets }}")
          fi

          echo "Deploying to Cloud Run..."
          "${CMD[@]}"

          URL=$(gcloud run services describe "${{ inputs.service }}" \
            "--region=${{ inputs.region }}" \
            --format='value(status.url)')
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Deployed: ${URL}"
