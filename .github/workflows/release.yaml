name: Release

# Versions the tbd-release action itself using semantic-release.
# Creates GitHub Releases (v1.0.0, v1.1.0, etc.) that callers pin to.
# Keeps the floating major action tag (v1, v2, etc.) pointing at the latest
# stable release so Marketplace examples can pin to the major version.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'LICENSE'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: release
        uses: ./
        with:
          mode: release
          environment: prod
          environments: '["prod"]'
          prerelease-identifiers: '{}'

      - name: Request Release Runner token for major tag
        id: major-token
        if: steps.release.outputs.released == 'true' && !contains(steps.release.outputs.version, '-')
        run: ./scripts/request-public-app-token.sh

      - name: Update major action tag
        if: steps.release.outputs.released == 'true' && !contains(steps.release.outputs.version, '-')
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_RUNNER_TOKEN: ${{ steps.major-token.outputs.token }}
        run: |
          set -euo pipefail

          prefix="${RELEASE_TAG%"${RELEASE_VERSION}"}"
          major="${RELEASE_VERSION%%.*}"
          major_tag="${prefix}${major}"
          target_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"

          git config user.name "semantic-release"
          git config user.email "semantic-release@users.noreply.github.com"
          git tag -f "${major_tag}" "${target_commit}"
          git push \
            "https://x-access-token:${RELEASE_RUNNER_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "refs/tags/${major_tag}" \
            --force
