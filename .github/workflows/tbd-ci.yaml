name: TBD CI — Build and Push PR Image

# Thin wrapper around magmamoose/release-runner@v1 (mode: ci).
# Prefer using the action directly for full control:
#
#   jobs:
#     build:
#       runs-on: ubuntu-latest
#       permissions:
#         contents: read
#         packages: write
#         pull-requests: read
#       steps:
#         - uses: magmamoose/release-runner@v1
#           with:
#             mode: ci
#             image_name: my-app
#             github-token: ${{ secrets.GITHUB_TOKEN }}

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Base image name without registry/owner (e.g., my-app)'
        required: true
        type: string
      bake_file:
        required: false
        type: string
        default: 'docker-bake.hcl'
      bake_target:
        required: false
        type: string
        default: 'default'
      platforms:
        required: false
        type: string
        default: 'linux/amd64'
      registry:
        required: false
        type: string
        default: 'ghcr.io'
      runner:
        required: false
        type: string
        default: 'ubuntu-latest'
      enforce_branch_naming:
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build (${{ inputs.bake_target }})
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - uses: magmamoose/release-runner@f4f8aa6a28207966ebfc85ab4255a014ed30cf33 # v1
        with:
          mode: ci
          image_name:              ${{ inputs.image_name }}
          bake_file:               ${{ inputs.bake_file }}
          bake_target:             ${{ inputs.bake_target }}
          platforms:               ${{ inputs.platforms }}
          registry:                ${{ inputs.registry }}
          enforce_branch_naming:   ${{ inputs.enforce_branch_naming }}
          github-token:            ${{ secrets.GITHUB_TOKEN }}
