name: TBD Promote — Create Promotion PR

# Reusable workflow: creates a promotion PR for the next environment in a TBD
# pipeline. Call this after a successful release to gate the next environment
# promotion behind a PR review.
#
# The promotion PR:
#   - branch: {prefix}/{next-env}/{version}  (e.g., promote/staging/1.2.3-dev.1)
#   - target: main (or configured target-branch)
#   - contains a .github/promotions/{version}-to-{next-env}.md marker file
#   - labelled: promotion
#
# Caller wires the release workflow to also trigger on pull_request:
#   types: [closed] — filtering for merged promote/* branches.
# The tbd-pr deployment-model in action.yml auto-detects the env from the branch.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version that was just released (e.g., 1.2.3-dev.1)'
        required: true
        type: string
      tag:
        description: 'Git tag (e.g., v1.2.3-dev.1)'
        required: true
        type: string
      current-environment:
        description: 'The environment that was just released'
        required: true
        type: string
      environments:
        description: 'JSON array of environments in promotion order'
        required: true
        type: string
      target-branch:
        description: 'Target branch for the promotion PR'
        required: false
        type: string
        default: 'main'
      prefix:
        description: 'Promotion branch prefix (must match promote-branch-prefix in tbd-release.yaml)'
        required: false
        type: string
        default: 'promote'
      runner:
        required: false
        type: string
        default: 'ubuntu-latest'

jobs:
  promote:
    name: Create Promotion PR (${{ inputs.current-environment }} → next)
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine next environment
        id: next-env
        env:
          INPUT_CURRENT_ENVIRONMENT: ${{ inputs.current-environment }}
          INPUT_ENVIRONMENTS: ${{ inputs.environments }}
        run: |
          set -euo pipefail
          ENV="${INPUT_CURRENT_ENVIRONMENT}"
          ENVS="${INPUT_ENVIRONMENTS}"
          LAST_ENV=$(echo "${ENVS}" | jq -r '.[-1]')

          if [ "${ENV}" == "${LAST_ENV}" ]; then
            echo "Current env '${ENV}' is the last — no promotion PR needed"
            echo "next_env=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ENV_INDEX=$(echo "${ENVS}" | jq -r --arg e "${ENV}" 'index($e)')
          NEXT_ENV=$(echo "${ENVS}" | jq -r --argjson i "${ENV_INDEX}" '.[$i + 1]')
          echo "next_env=${NEXT_ENV}" >> "$GITHUB_OUTPUT"
          echo "Next environment: ${NEXT_ENV}"

      - name: Create promotion PR
        if: steps.next-env.outputs.next_env != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_ENV: ${{ steps.next-env.outputs.next_env }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PREFIX: ${{ inputs.prefix }}
          INPUT_TARGET_BRANCH: ${{ inputs.target-branch }}
        run: |
          set -euo pipefail

          VERSION="${INPUT_VERSION}"
          TAG="${INPUT_TAG}"
          PREFIX="${INPUT_PREFIX}"
          TARGET="${INPUT_TARGET_BRANCH}"
          BRANCH="${PREFIX}/${NEXT_ENV}/${VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"

          # Create a promotion marker (gives the PR a visible diff to review)
          mkdir -p .github/promotions
          cat > ".github/promotions/${VERSION}-to-${NEXT_ENV}.md" <<EOF
          Promote ${TAG} to ${NEXT_ENV}.
          EOF

          git add ".github/promotions/${VERSION}-to-${NEXT_ENV}.md"
          git commit -m "chore(release): promote ${TAG} to ${NEXT_ENV} [skip ci]"
          git push origin "${BRANCH}"

          gh pr create \
            --title "chore(release): promote ${TAG} to ${NEXT_ENV}" \
            --body "Merging this PR will trigger the **${NEXT_ENV}** release for \`${TAG}\`." \
            --base "${TARGET}" \
            --head "${BRANCH}" \
            --label "promotion" \
          || echo "::warning::PR creation failed (may already exist)"
