name: Release Runner (with concurrency)

# Reusable workflow wrapper around magmamoose/release-runner.
#
# Why this exists alongside the composite action:
#   The action is a composite action — it runs *inside* a job that the
#   caller defines. Composite actions cannot declare workflow-level
#   `concurrency:`, which is the only mechanism GitHub Actions offers
#   for serialising release runs on a branch. So callers had to add the
#   concurrency block to every workflow themselves; if they forgot, two
#   runs on the same branch could race — one would create the tag, the
#   other would fail with "Upstream branch has changed" or "tag already
#   exists" mid-flight.
#
#   This wrapper *is* a workflow, so it can declare concurrency. Every
#   caller that uses this wrapper opts into the lock automatically.
#   Two simultaneous runs on the same target branch end up in the same
#   concurrency group, GitHub queues the second one until the first
#   finishes, and the race window goes away.
#
# Usage (caller's `.github/workflows/release.yml`):
#
#   jobs:
#     release:
#       uses: magmamoose/release-runner/.github/workflows/release-runner.yaml@v1
#       permissions:
#         contents: read
#         id-token: write
#       with:
#         versioning-tool: gitversion
#         deployment-model: bbd
#         branch-map: |
#           {"develop": "dev", "release/*": "staging", "master": "prod"}
#         # ...
#       secrets:
#         app-private-key: ${{ secrets.SEMANTIC_RELEASE_APP_PRIVATE_KEY }}
#
# Direct action usage (`uses: magmamoose/release-runner@v1`) still
# works and is unchanged — pick this wrapper when you want the lock
# without thinking about it, pick the action when you have a more
# unusual setup.

on:
  workflow_call:

    # ─── Concurrency override ─────────────────────────────────────────────
    inputs:
      concurrency-group:
        description: |
          Concurrency group key. Defaults to
          `release-runner-${target-branch}` where target-branch comes
          from `pull_request.base.ref` (promotion-PR merges) or
          `github.ref_name` (push / workflow_dispatch). Override only if
          you need a more or less aggressive grouping.
        required: false
        type: string
        default: ''

      cancel-in-progress:
        description: |
          Whether to cancel an in-flight run when a new one enters the
          group. Default `false` — running releases should finish
          (cutting the tag and pushing the version-file commit) rather
          than be killed mid-flight.
        required: false
        type: boolean
        default: false

      # ─── Mirror of action inputs ────────────────────────────────────────
      mode:
        type: string
        default: 'release'
      auth-mode:
        type: string
        default: 'public-app'
      token-broker-url:
        type: string
        default: 'https://release-runner.sargeant.workers.dev'
      oidc-audience:
        type: string
        default: 'release-runner'
      versioning-tool:
        type: string
        default: 'semantic-release-python'
      deployment-model:
        type: string
        default: 'tbd'
      branch-map:
        type: string
        default: ''
      promote-branch-prefix:
        type: string
        default: 'promote'
      promote-target-branch:
        type: string
        default: 'main'
      create-promotion-pr:
        type: string
        default: 'false'
      environment:
        type: string
        default: ''
      environments:
        type: string
        default: '["dev", "staging", "prod"]'
      prerelease-identifiers:
        type: string
        default: '{"dev": "dev", "staging": "rc"}'
      tag-prefix:
        type: string
        default: 'v'
      app-id:
        type: string
        default: ''
      image_name:
        type: string
        default: ''
      bake_file:
        type: string
        default: 'docker-bake.hcl'
      bake_target:
        type: string
        default: 'default'
      registry:
        type: string
        default: 'ghcr.io'
      platforms:
        type: string
        default: 'linux/amd64'
      enforce_branch_naming:
        type: string
        default: 'true'
      admin-required-from:
        type: string
        default: '@last'
      working-directory:
        type: string
        default: '.'
      create-release:
        type: string
        default: 'true'
      changelog:
        type: string
        default: 'true'
      force-bump:
        type: string
        default: ''
      version-file:
        type: string
        default: ''
      version-file-json-path:
        type: string
        default: '.Application.Version'
      aggregate-github-projects:
        type: string
        default: 'false'
      move-github-projects-on-release:
        type: string
        default: 'false'
      github-projects-target-status:
        type: string
        default: 'Released'
      github-projects-move-on-environments:
        type: string
        default: '@last'
      aggregate-clickup-tickets:
        type: string
        default: 'false'
      gitversion-spec:
        type: string
        default: '6.x'
      gitversion-config:
        type: string
        default: 'GitVersion.yml'
      gitversion-appsettings-file:
        description: 'DEPRECATED — use version-file instead.'
        type: string
        default: ''
      gitversion-appsettings-version-path:
        description: 'DEPRECATED — use version-file-json-path instead.'
        type: string
        default: ''
      release-please-release-type:
        type: string
        default: 'simple'
      release-please-config-file:
        type: string
        default: 'release-please-config.json'

    secrets:
      github-token:
        description: 'Override the workflow GITHUB_TOKEN. Required when auth-mode is github-token and the default token is not allowed for the writes the action performs.'
        required: false
      app-private-key:
        description: 'Private GitHub App PEM. Required when auth-mode is private-app.'
        required: false
      build-github-token:
        description: 'Optional token forwarded to docker buildx bake as --secret id=github_token (private package installs).'
        required: false

    outputs:
      version:
        description: 'Semver version string without prefix (e.g., 1.2.3)'
        value: ${{ jobs.release.outputs.version }}
      tag:
        description: 'Full git tag with prefix (e.g., v1.2.3)'
        value: ${{ jobs.release.outputs.tag }}
      released:
        description: '"true" if a new version was created and published'
        value: ${{ jobs.release.outputs.released }}
      is-prerelease:
        description: '"true" if this environment produces a prerelease version'
        value: ${{ jobs.release.outputs.is-prerelease }}
      prerelease-identifier:
        description: 'Prerelease identifier (e.g. dev, rc). Empty for stable.'
        value: ${{ jobs.release.outputs.prerelease-identifier }}
      resolved-environment:
        description: 'The resolved environment name.'
        value: ${{ jobs.release.outputs.resolved-environment }}

# ─────────────────────────────────────────────────────────────────────────────
# THE LOCK
# ─────────────────────────────────────────────────────────────────────────────
#
# `release-runner-<target-branch>` groups every run that targets the same
# branch — push, workflow_dispatch, and pull_request:closed (promotion
# PR merges) all resolve to the same key:
#
#   - push:                 github.ref_name              → "main"
#   - workflow_dispatch:    github.ref_name              → "main"
#   - pull_request:closed:  pull_request.base.ref        → "main"
#
# `cancel-in-progress: false` means the lock is FIFO: a queued run waits
# for the in-flight one to finish (tag, version-file push-back, Docker
# promotion, promotion-PR creation) instead of being killed.
concurrency:
  group: ${{ inputs.concurrency-group != '' && inputs.concurrency-group || format('release-runner-{0}', github.event.pull_request.base.ref || github.ref_name) }}
  cancel-in-progress: ${{ inputs.cancel-in-progress }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.run.outputs.version }}
      tag: ${{ steps.run.outputs.tag }}
      released: ${{ steps.run.outputs.released }}
      is-prerelease: ${{ steps.run.outputs.is-prerelease }}
      prerelease-identifier: ${{ steps.run.outputs.prerelease-identifier }}
      resolved-environment: ${{ steps.run.outputs.resolved-environment }}
    steps:
      - id: run
        uses: magmamoose/release-runner@f4f8aa6a28207966ebfc85ab4255a014ed30cf33 # v1
        with:
          mode: ${{ inputs.mode }}
          auth-mode: ${{ inputs.auth-mode }}
          token-broker-url: ${{ inputs.token-broker-url }}
          oidc-audience: ${{ inputs.oidc-audience }}
          versioning-tool: ${{ inputs.versioning-tool }}
          deployment-model: ${{ inputs.deployment-model }}
          branch-map: ${{ inputs.branch-map }}
          promote-branch-prefix: ${{ inputs.promote-branch-prefix }}
          promote-target-branch: ${{ inputs.promote-target-branch }}
          create-promotion-pr: ${{ inputs.create-promotion-pr }}
          environment: ${{ inputs.environment }}
          environments: ${{ inputs.environments }}
          prerelease-identifiers: ${{ inputs.prerelease-identifiers }}
          tag-prefix: ${{ inputs.tag-prefix }}
          github-token: ${{ secrets.github-token }}
          app-id: ${{ inputs.app-id }}
          app-private-key: ${{ secrets.app-private-key }}
          image_name: ${{ inputs.image_name }}
          bake_file: ${{ inputs.bake_file }}
          bake_target: ${{ inputs.bake_target }}
          registry: ${{ inputs.registry }}
          platforms: ${{ inputs.platforms }}
          build-github-token: ${{ secrets.build-github-token }}
          enforce_branch_naming: ${{ inputs.enforce_branch_naming }}
          admin-required-from: ${{ inputs.admin-required-from }}
          working-directory: ${{ inputs.working-directory }}
          create-release: ${{ inputs.create-release }}
          changelog: ${{ inputs.changelog }}
          force-bump: ${{ inputs.force-bump }}
          version-file: ${{ inputs.version-file }}
          version-file-json-path: ${{ inputs.version-file-json-path }}
          aggregate-github-projects: ${{ inputs.aggregate-github-projects }}
          move-github-projects-on-release: ${{ inputs.move-github-projects-on-release }}
          github-projects-target-status: ${{ inputs.github-projects-target-status }}
          github-projects-move-on-environments: ${{ inputs.github-projects-move-on-environments }}
          aggregate-clickup-tickets: ${{ inputs.aggregate-clickup-tickets }}
          gitversion-spec: ${{ inputs.gitversion-spec }}
          gitversion-config: ${{ inputs.gitversion-config }}
          gitversion-appsettings-file: ${{ inputs.gitversion-appsettings-file }}
          gitversion-appsettings-version-path: ${{ inputs.gitversion-appsettings-version-path }}
          release-please-release-type: ${{ inputs.release-please-release-type }}
          release-please-config-file: ${{ inputs.release-please-config-file }}
