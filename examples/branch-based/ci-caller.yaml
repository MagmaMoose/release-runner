# Branch-based deployment example: CI workflow
# Copy to: .github/workflows/ci.yaml in your application repo
#
# Deployment model: branch-based (GitFlow-esque)
#   Each branch corresponds to an environment.
#   PRs target the lowest environment branch (dev).
#   Merges up the chain promote through environments.
#
# Branch model:
#   feat/*, fix/* → PR → dev → staging → main
#
# Image tag model:
#   PR targeting dev: pr-<N>
#   (dev/staging/main releases are handled by release-caller.yaml)
#
# For PRs targeting higher branches (staging, main), add those branches
# to the `branches:` list below.

name: CI

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Add your test job(s) here ─────────────────────────────────────────────
  # test:
  #   name: Tests
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: make test

  build-api:
    name: Build API image
    # needs: test
    uses: calebsargeant/tbd-release/.github/workflows/tbd-ci.yaml@main
    with:
      image_name: my-app-api         # → ghcr.io/your-org/my-app-api:pr-<N>
      bake_file: docker-bake.hcl
      bake_target: api
      platforms: linux/amd64
      # Branch naming is flexible for branch-based pipelines.
      # Set to false if your dev branches don't follow feat/fix/* convention.
      enforce_branch_naming: true
    secrets: inherit

  build-worker:
    name: Build Worker image
    # needs: test
    uses: calebsargeant/tbd-release/.github/workflows/tbd-ci.yaml@main
    with:
      image_name: my-app-worker      # → ghcr.io/your-org/my-app-worker:pr-<N>
      bake_file: docker-bake.hcl
      bake_target: worker
      platforms: linux/amd64
      enforce_branch_naming: true
    secrets: inherit
