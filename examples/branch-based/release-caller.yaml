# Branch-based deployment example: release workflow
# Copy to: .github/workflows/release.yaml in your application repo
#
# Deployment model: branch-based (GitFlow-esque)
#   Each long-lived branch maps to an environment.
#   Pushing to a branch triggers a release for that environment.
#   No workflow_dispatch needed — environment is inferred from the branch.
#
# Branch → environment mapping:
#   dev      → dev release     (v1.2.3-dev.1)     prerelease
#   staging  → staging release (v1.2.3-rc.1)      prerelease
#   main     → production      (v1.2.3)            stable
#
# Promotion flow:
#   feat/* PR merged → dev  → semver dev tag  → images tagged dev
#   dev merged → staging   → semver rc tag    → images retagged from dev
#   staging merged → main  → semver stable    → images retagged from rc + :latest
#
# Required secrets:
#   SEMANTIC_RELEASE_APP_ID          GitHub App ID (for branch protection bypass)
#   SEMANTIC_RELEASE_APP_PRIVATE_KEY GitHub App private key

name: Release

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'CHANGELOG.md'

jobs:
  release:
    uses: calebsargeant/tbd-release/.github/workflows/tbd-release.yaml@main
    with:
      versioning-tool: semantic-release-python

      # deployment-model: branch-based means environment is auto-detected
      # from the current branch using branch-map below.
      # Do NOT set the `environment` input — it is inferred automatically.
      deployment-model: branch-based
      branch-map: '{"dev": "dev", "staging": "staging", "main": "prod"}'

      environments: '["dev", "staging", "prod"]'
      prerelease-identifiers: '{"dev": "dev", "staging": "rc"}'

      # Docker image promotion — same logic as TBD:
      #   dev   push: retags pr-<N>       → v1.2.3-dev.1
      #   staging push: retags v1.2.3-dev.1 → v1.2.3-rc.1
      #   main  push: retags v1.2.3-rc.1  → v1.2.3 + :latest
      images: >-
        [
          {"name": "my-app-api",    "bake_target": "api"},
          {"name": "my-app-worker", "bake_target": "worker"}
        ]
      bake_file: docker-bake.hcl
    secrets: inherit
