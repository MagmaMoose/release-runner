# python-semantic-release v10 configuration for a TBD pipeline.
# Place at the repo root (or point working-directory at its location).
# https://python-semantic-release.readthedocs.io/en/latest/configuration.html

[tool.semantic_release]
# PSR updates this value on each release — do not edit manually.
version_variables = ["pyproject.toml:tool.semantic_release.version"]
version = "0.1.0"

build_command  = ""        # No Python package to build
major_on_zero  = false     # 0.x → minor bumps; set true to allow 0.x → 1.0.0
tag_format     = "v{version}"
commit_message = "chore(release): v{version}"

# TBD: single trunk, no long-lived branches.
[tool.semantic_release.branches.main]
match      = "(main|master)"
prerelease = false          # The action controls prerelease via its inputs, not here.

[tool.semantic_release.changelog]
changelog_file            = "CHANGELOG.md"
exclude_commit_patterns   = []

[tool.semantic_release.commit_parser_options]
# Conventional Commits — maps commit types to version bumps:
#   feat:  → minor bump  (v1.1.0 → v1.2.0)
#   fix:   → patch bump  (v1.1.0 → v1.1.1)
#   BREAKING CHANGE footer → major bump (v1.1.0 → v2.0.0)
allowed_tags = ["feat", "fix", "docs", "style", "refactor", "perf",
                "test", "build", "ci", "chore", "revert"]
minor_tags   = ["feat"]
patch_tags   = ["fix", "perf"]

[tool.semantic_release.remote]
type = "github"
