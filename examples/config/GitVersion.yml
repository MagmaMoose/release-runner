# GitVersion configuration for a TBD (single trunk) pipeline.
# https://gitversion.net/docs/reference/configuration

# Workflow: Continuous Delivery — TBD produces a new version on every commit.
workflow: GitFlow/v1

# All branches derive from main (trunk).
branches:
  main:
    regex: ^(main|master)$
    mode: ContinuousDelivery
    increment: Patch
    prevent-increment-of-merged-branch-version: true

  feat:
    regex: ^feat/
    mode: ContinuousDelivery
    increment: Minor
    source-branches:
      - main

  fix:
    regex: ^fix/
    mode: ContinuousDelivery
    increment: Patch
    source-branches:
      - main

  hotfix:
    regex: ^hotfix/
    mode: ContinuousDelivery
    increment: Patch
    source-branches:
      - main

# Tag prefix (without the v, GitVersion adds it)
tag-prefix: '[vV]'

# Assembly version format
assembly-versioning-scheme: MajorMinorPatch
