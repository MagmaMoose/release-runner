# Dual-environment TBD example: dev/tst → prod
#
# Copy to: .github/workflows/ci.yaml in your application repo
# Environments: dev+tst (automated on every merge to main), prod (gated via GitHub Release)
#
# Required secrets in your repo:
#   SEMANTIC_RELEASE_APP_ID           — GitHub App ID (see README for setup)
#   SEMANTIC_RELEASE_APP_PRIVATE_KEY  — GitHub App private key
#   GCP_CREDENTIALS_PROD              — GCP service account JSON for production

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Add your app-specific test job(s) here, then make build jobs depend on them.
  # Example (uncomment and customise):
  # test:
  #   name: Tests
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: make test

  build:
    name: Build Image
    # needs: test  # uncomment once you add a test job
    uses: calebsargeant/tbd-release/.github/workflows/tbd-ci.yaml@main
    with:
      image_name: my-app           # → ghcr.io/your-org/my-app:pr-<N>
      bake_file: docker-bake.hcl
      bake_target: default
      platforms: linux/amd64
      enforce_branch_naming: true
    secrets: inherit
